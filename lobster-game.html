<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🦞 龍蝦大戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00d4ff;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 500px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            border: 3px solid #00d4ff;
            overflow: hidden;
        }
        #player {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 50px;
            bottom: 20px;
            left: 50%;
            will-change: transform; /* GPU 加速提示 */
        }
        .bubble {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 30px;
            will-change: transform; /* 硬體加速提示 */
        }
        @keyframes fall {
            0% { top: -40px; opacity: 1; }
            100% { top: 520px; opacity: 0; }
        }
        
        /* 分數彈出動畫 */
        .score-popup {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            animation: scoreFloat 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        
        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        
        /* 接到金幣時的玩家動畫 */
        @keyframes playerCatch {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        .player-catch {
            animation: playerCatch 0.2s ease-out;
        }
        
        /* 受傷震動動畫 */
        @keyframes damageShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); background: rgba(255,0,0,0.3); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
        
        /* 無敵時間閃爍效果 */
        @keyframes invincible {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px gold); }
            50% { opacity: 0.5; filter: drop-shadow(0 0 15px gold); }
        }
        
        .player-invincible {
            animation: invincible 0.25s infinite;
        }
        
        /* 道具效果指示器 */
        #powerupIndicator {
            position: absolute;
            top: 60px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        
        #difficultyIndicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 15px;
            color: #00d4ff;
            z-index: 10;
        }
        
        .powerup-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            animation: powerupPulse 0.5s infinite alternate;
        }
        
        .powerup-shield {
            background: rgba(0, 191, 255, 0.8);
            box-shadow: 0 0 10px #00bfff;
        }
        
        .powerup-2x {
            background: rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 10px #ffd700;
        }
        
        @keyframes powerupPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        
        /* 道具彈出動畫 */
        .powerup-popup {
            position: absolute;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 10px;
            animation: powerupFloat 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        
        @keyframes powerupFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
        }
        
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
        #lives {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .life-lost {
            animation: lifeLost 0.5s ease-out;
        }
        @keyframes lifeLost {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 1.5rem;
            background: #00d4ff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
            transition: transform 0.2s;
        }
        #startBtn:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #gameOver h2 {
            font-size: 3rem;
            color: #ff6b6b;
        }
        #finalScore {
            font-size: 2rem;
            margin: 20px 0;
        }
        #highScore {
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 20px;
        }
        #restartBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #00d4ff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
        }
        #pauseOverlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        #pauseOverlay h2 {
            font-size: 3rem;
            color: #00d4ff;
            margin-bottom: 20px;
        }
        #pauseScore {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 10px;
        }
        #pauseLives {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        #resumeBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #00d4ff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
        }
        .instructions {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        /* 行動裝置觸控按鈕 */
        .touch-controls {
            display: none;
            margin-top: 20px;
            gap: 30px;
        }
        
        .touch-btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 212, 255, 0.3);
            border: 3px solid #00d4ff;
            border-radius: 50%;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: transform 0.1s, background 0.1s;
        }
        
        .touch-btn:active {
            transform: scale(0.9);
            background: rgba(0, 212, 255, 0.6);
        }
        
        /* 音效開關按鈕 */
        #soundBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            padding: 8px 15px;
            transition: transform 0.2s;
            z-index: 10;
        }
        #soundBtn:hover {
            transform: scale(1.1);
        }
        
        /* 行動裝置適配 */
        @media (max-width: 850px) {
            #gameContainer {
                width: 95vw;
                height: 60vh;
                max-height: 500px;
            }
            h1 {
                font-size: 2rem;
            }
            .instructions {
                font-size: 1rem;
            }
            .touch-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <h1>🦞 龍蝦大戰</h1>
    <div id="gameContainer">
        <div id="score">分數: 0</div>
        <button id="soundBtn" title="音效開關">🔊</button>
        <div id="lives">❤️❤️❤️</div>
        <div id="powerupIndicator"></div>
        <div id="difficultyIndicator">難度 1</div>
        <div id="player">🦞</div>
        <button id="startBtn">開始遊戲</button>
        <div id="gameOver">
            <h2>遊戲結束!</h2>
            <div id="highScore">最高分: 0</div>
            <div id="finalScore">分數: 0</div>
            <button id="restartBtn">再玩一次</button>
        </div>
        <div id="pauseOverlay">
            <h2>暫停</h2>
            <div id="pauseScore">分數: 0</div>
            <div id="pauseLives">❤️❤️❤️</div>
            <button id="resumeBtn">繼續遊戲</button>
        </div>
    </div>
    <p class="instructions">← → 方向鍵移動龍蝦，接住掉落的金幣！💰 按 ESC 暫停</p>
    
    <!-- 行動裝置觸控按鈕 -->
    <div class="touch-controls">
        <div class="touch-btn" id="btnLeft">◀</div>
        <div class="touch-btn" id="btnRight">▶</div>
        <div class="touch-btn" id="btnPause">⏸</div>
    </div>

    <script>
        // ==================== 遊戲配置常數 ====================
        const GAME_CONFIG = {
            // 遊戲容器尺寸
            CONTAINER_WIDTH: 800,
            CONTAINER_HEIGHT: 500,
            
            // 玩家尺寸
            PLAYER_WIDTH: 60,
            PLAYER_HEIGHT: 60,
            PLAYER_BOTTOM: 20,           // 玩家距離底部的距離
            PLAYER_MOVE_SPEED: 0.4,     // 移動速度 (像素/毫秒)
            
            // 氣泡/物品
            BUBBLE_SIZE: 40,
            BUBBLE_START_Y: -40,
            
            // 生命值
            MAX_LIVES: 3,
            MAX_LIVES_CAP: 5,            // 吃到愛心道具的上限
            INVINCIBLE_DURATION: 1000,  // 受傷後無敵時間 (ms)
            
            // 分數
            COIN_BASE_POINTS: 10,       // 普通金幣基礎分數
            COIN_2X_POINTS: 20,         // 雙倍分數
            
            // 難度系統
            INITIAL_SPAWN_INTERVAL: 800,
            MIN_SPAWN_INTERVAL: 300,
            INITIAL_BUBBLE_SPEED: 3,
            MAX_BUBBLE_SPEED: 8,
            DIFFICULTY_INCREASE_PER: 50,
            SPAWN_DECREASE_PER_LEVEL: 50,
            SPEED_INCREASE_PER_LEVEL: 0.5,
            BAD_CHANCE_BASE: 0.2,
            BAD_CHANCE_MAX: 0.35,
            BAD_CHANCE_INCREASE: 0.03,
            POWERUP_CHANCE: 0.1,
            
            // 道具持續時間
            SHIELD_DURATION: 5000,
            DOUBLE_DURATION: 8000,
            
            // 動畫時間
            SCORE_POPUP_DURATION: 800,
            PLAYER_CATCH_DURATION: 200,
            DAMAGE_SHAKE_DURATION: 500,
            LIFE_LOST_DURATION: 500,
            START_LOCK_DURATION: 500,
            
            // 本地存儲鍵名
            HIGH_SCORE_KEY: 'lobsterGameHighScore',
            SOUND_ENABLED_KEY: 'lobsterGameSoundEnabled'
        };
        
        const ITEM_EMOJIS = {
            GOOD: ['💰', '💎', '⭐', '🎵', '🎮'],
            BAD: ['💣', '🔥', '👾']
        };
        
        const POWERUPS = [
            { emoji: '🛡️', type: 'shield', duration: GAME_CONFIG.SHIELD_DURATION, name: '護盾' },
            { emoji: '🌟', type: '2x', duration: GAME_CONFIG.DOUBLE_DURATION, name: '雙倍' },
            { emoji: '❤️', type: 'heart', duration: 0, name: '生命+1' }
        ];

        // ==================== DOM 元素 ====================
        const player = document.getElementById('player');
        const gameContainer = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const gameOver = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const resumeBtn = document.getElementById('resumeBtn');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnPause = document.getElementById('btnPause');
        const livesDisplay = document.getElementById('lives');
        const soundBtn = document.getElementById('soundBtn');
        const pauseScore = document.getElementById('pauseScore');
        const pauseLives = document.getElementById('pauseLives');

        let playerX = (GAME_CONFIG.CONTAINER_WIDTH - GAME_CONFIG.PLAYER_WIDTH) / 2;
        let score = 0;
        let lives = GAME_CONFIG.MAX_LIVES;
        let highScore = parseInt(localStorage.getItem(GAME_CONFIG.HIGH_SCORE_KEY)) || 0;
        
        // 初始化最高分顯示（頁面載入時就顯示 localStorage 的值）
        highScoreDisplay.textContent = '最高分: ' + formatScore(highScore);
        
        let gameRunning = false;
        let isPaused = false;
        let bubbles = [];
        let lastTime = 0;
        let spawnTimer = 0;
        let animationFrameId = null;
        let isStarting = false; // 防止快速重複點擊
        let audioContext = null; // Web Audio API

        // ==================== DOM 元素物件池 (效能優化) ====================
        // 重用 DOM 元素，避免頻繁創建/刪除導致的效能損耗
        const bubblePool = [];
        const POOL_MAX_SIZE = 30; // 池的最大大小
        
        // 彈出動畫元素物件池（分數彈出、道具彈出）
        const popupPool = [];
        const POPUP_POOL_MAX_SIZE = 15; // 彈出池的最大大小

        // 從池中取得氣泡元素，或創建新的
        function getBubbleFromPool() {
            if (bubblePool.length > 0) {
                const element = bubblePool.pop();
                return element;
            }
            const element = document.createElement('div');
            element.className = 'bubble';
            return element;
        }

        // 將氣泡元素返回池中
        function returnBubbleToPool(element) {
            // 清除元素內容和樣式
            element.textContent = '';
            element.style.left = '';
            element.style.transform = '';
            element.style.display = '';
            
            if (bubblePool.length < POOL_MAX_SIZE) {
                bubblePool.push(element);
            } else {
                // 池滿時直接移除
                element.remove();
            }
        }
        
        // 從池中取得彈出動畫元素，或創建新的
        function getPopupFromPool(className) {
            if (popupPool.length > 0) {
                const element = popupPool.pop();
                element.className = className;
                return element;
            }
            const element = document.createElement('div');
            element.className = className;
            return element;
        }
        
        // 將彈出動畫元素返回池中
        function returnPopupToPool(element) {
            // 清除元素內容和樣式
            element.textContent = '';
            element.style.left = '';
            element.style.top = '';
            element.style.background = '';
            element.style.display = '';
            
            if (popupPool.length < POPUP_POOL_MAX_SIZE) {
                popupPool.push(element);
            } else {
                // 池滿時直接移除
                element.remove();
            }
        }
        
        // 音效開關（從本地存儲讀取設置，預設為開啟）
        let soundEnabled = localStorage.getItem(GAME_CONFIG.SOUND_ENABLED_KEY) !== 'false';
        soundBtn.textContent = soundEnabled ? '🔊' : '🔇';

        // 初始化音效系統
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }

        // 播放音效（使用 Web Audio API 生成簡單音效）
        function playSound(type) {
            // 音效關閉時跳過
            if (!soundEnabled) return;
            
            try {
                const ctx = initAudio();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                if (type === 'coin') {
                    // 接金幣：高音嗶聲
                    oscillator.frequency.setValueAtTime(880, ctx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.15);
                } else if (type === 'bomb') {
                    // 碰到炸彈：低音轟聲
                    oscillator.frequency.setValueAtTime(200, ctx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.4, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.3);
                } else if (type === 'start') {
                    // 遊戲開始：上升音調
                    oscillator.frequency.setValueAtTime(440, ctx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.2);
                    gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.25);
                } else if (type === 'gameover') {
                    // 遊戲結束：下降音調
                    oscillator.frequency.setValueAtTime(440, ctx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.5);
                    gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.5);
                }
            } catch (e) {
                // 音效失敗時靜默忽略
                console.log('音效播放失敗:', e);
            }
        }

        // 統一移動控制系統（使用遊戲循環 + deltaTime）
        const keys = { left: false, right: false };
        const MOVE_SPEED = 0.4; // 像素/毫秒

        // 預先計算玩家邊界（只計算一次）
        let playerLeft, playerRight, playerTop, playerBottom;
        const PLAYER_WIDTH = 60;
        const PLAYER_HEIGHT = 60;
        const CONTAINER_WIDTH = 800;
        const CONTAINER_HEIGHT = 500;
        const BUBBLE_SIZE = 40;
        const MAX_PLAYER_X = CONTAINER_WIDTH - PLAYER_WIDTH;

        // 難度系統參數
        const INITIAL_SPAWN_INTERVAL = 800; // 初始生成間隔 (ms)
        const MIN_SPAWN_INTERVAL = 300;      // 最小生成間隔 (ms)
        const INITIAL_BUBBLE_SPEED = 3;       // 初始氣泡速度
        const MAX_BUBBLE_SPEED = 8;           // 最大氣泡速度
        const DIFFICULTY_INCREASE_PER = 50;  // 每多少分數增加一次難度

        // 計算當前難度等級
        function getDifficultyLevel() {
            return Math.floor(score / DIFFICULTY_INCREASE_PER);
        }

        // 計算當前生成間隔
        function getCurrentSpawnInterval() {
            const level = getDifficultyLevel();
            return Math.max(MIN_SPAWN_INTERVAL, INITIAL_SPAWN_INTERVAL - (level * GAME_CONFIG.SPAWN_DECREASE_PER_LEVEL));
        }

        // 計算當前氣泡速度
        function getCurrentBubbleSpeed() {
            const level = getDifficultyLevel();
            return Math.min(MAX_BUBBLE_SPEED, INITIAL_BUBBLE_SPEED + (level * GAME_CONFIG.SPEED_INCREASE_PER_LEVEL) + (Math.random() * 2));
        }
        
        // 道具狀態
        let activePowerups = {
            shield: false,
            '2x': false
        };
        let powerupTimers = {};

        // 格式化分數顯示（千分位）
        function formatScore(num) {
            return num.toLocaleString('zh-TW');
        }

        // 顯示分數彈出動畫
        function showScorePopup(x, y, points) {
            const popup = getPopupFromPool('score-popup');
            popup.textContent = '+' + formatScore(points);
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            gameContainer.appendChild(popup);
            
            // 動畫結束後返回池中
            setTimeout(() => {
                popup.remove();
                returnPopupToPool(popup);
            }, GAME_CONFIG.SCORE_POPUP_DURATION);
        }

        // 更新生命值顯示
        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < lives; i++) {
                hearts += '❤️';
            }
            livesDisplay.textContent = hearts;
            
            // 生命值減少時觸發動畫
            if (lives < GAME_CONFIG.MAX_LIVES) {
                livesDisplay.classList.add('life-lost');
                setTimeout(() => livesDisplay.classList.remove('life-lost'), GAME_CONFIG.LIFE_LOST_DURATION);
            }
        }

        // 更新難度等級顯示
        function updateDifficultyDisplay() {
            const difficultyIndicator = document.getElementById('difficultyIndicator');
            const level = getDifficultyLevel();
            difficultyIndicator.textContent = '難度 ' + (level + 1);
            
            // 難度提升時的視覺效果
            if (level > 0) {
                difficultyIndicator.style.color = level >= 5 ? '#ff6b6b' : level >= 3 ? '#ffd700' : '#00d4ff';
            }
        }

        // 玩家受傷時的動畫
        function triggerDamageAnimation() {
            gameContainer.style.animation = 'none';
            void gameContainer.offsetWidth; // 強制重繪
            gameContainer.style.animation = `damageShake ${GAME_CONFIG.DAMAGE_SHAKE_DURATION}ms ease-out`;
        }

        // 碰到炸彈時的處理（扣血而非直接結束）
        let isInvincible = false; // 無敵狀態標誌
        let invincibleReason = null; // 無敵原因: 'damage' | 'shield' | null

        function handleDamage() {
            // 無敵時間內不再受傷
            if (isInvincible) return;
            
            playSound('bomb');
            lives--;
            updateLivesDisplay();
            
            // 無敵時間閃爍效果
            player.classList.add('player-invincible');
            isInvincible = true;
            invincibleReason = 'damage';
            
            if (lives <= 0) {
                player.classList.remove('player-invincible');
                isInvincible = false;
                invincibleReason = null;
                endGame();
            } else {
                // 無敵時間 1 秒，遊戲繼續進行
                setTimeout(() => {
                    if (lives > 0) {
                        player.classList.remove('player-invincible');
                        isInvincible = false;
                        invincibleReason = null;
                    }
                }, GAME_CONFIG.INVINCIBLE_DURATION);
            }
        }

        // 玩家接到物品時的動畫
        function triggerPlayerCatchAnimation() {
            player.classList.remove('player-catch');
            void player.offsetWidth; // 強制重繪
            player.classList.add('player-catch');
        }

        // 啟動道具效果
        function activatePowerup(powerup, x, y) {
            playSound('coin');
            
            // 顯示道具彈出動畫（使用物件池）
            const popup = getPopupFromPool('powerup-popup');
            popup.textContent = powerup.name + '！';
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            popup.style.background = powerup.type === 'shield' ? 'rgba(0,191,255,0.8)' : 
                                      powerup.type === '2x' ? 'rgba(255,215,0,0.8)' : 'rgba(255,0,0,0.8)';
            gameContainer.appendChild(popup);
            setTimeout(() => {
                popup.remove();
                returnPopupToPool(popup);
            }, GAME_CONFIG.SCORE_POPUP_DURATION);
            
            // 處理不同道具效果
            if (powerup.type === 'shield') {
                activePowerups.shield = true;
                isInvincible = true;
                invincibleReason = 'shield'; // 設置無敵原因為護盾
                player.classList.add('player-invincible');
                updatePowerupIndicator();
                
                // 清除之前的計時器
                if (powerupTimers.shield) clearTimeout(powerupTimers.shield);
                powerupTimers.shield = setTimeout(() => {
                    activePowerups.shield = false;
                    // 移除無敵效果（無論是否受傷，都應該在護盾結束後移除無敵狀態）
                    if (invincibleReason === 'shield') {
                        isInvincible = false;
                        invincibleReason = null;
                        player.classList.remove('player-invincible');
                    } else if (invincibleReason !== 'damage') {
                        // 如果既不是護盾也不是受傷導致的無敵，則清除
                        isInvincible = false;
                        invincibleReason = null;
                        player.classList.remove('player-invincible');
                    }
                    updatePowerupIndicator();
                }, powerup.duration);
            } 
            else if (powerup.type === '2x') {
                activePowerups['2x'] = true;
                updatePowerupIndicator();
                
                // 清除之前的計時器
                if (powerupTimers['2x']) clearTimeout(powerupTimers['2x']);
                powerupTimers['2x'] = setTimeout(() => {
                    activePowerups['2x'] = false;
                    updatePowerupIndicator();
                }, powerup.duration);
            }
            else if (powerup.type === 'heart') {
                if (lives < GAME_CONFIG.MAX_LIVES_CAP) {
                    lives++;
                    updateLivesDisplay();
                }
            }
        }

        // 更新道具指示器顯示
        function updatePowerupIndicator() {
            const indicator = document.getElementById('powerupIndicator');
            indicator.innerHTML = '';
            
            if (activePowerups.shield) {
                const badge = document.createElement('div');
                badge.className = 'powerup-badge powerup-shield';
                badge.textContent = '🛡️ 護盾';
                indicator.appendChild(badge);
            }
            if (activePowerups['2x']) {
                const badge = document.createElement('div');
                badge.className = 'powerup-badge powerup-2x';
                badge.textContent = '🌟 雙倍';
                indicator.appendChild(badge);
            }
        }

        // 使用 requestAnimationFrame 替代 setInterval
        function gameLoop(timestamp) {
            if (!gameRunning) {
                return; // 遊戲結束，停止動畫循環
            }
            
            if (isPaused) {
                // 暫停時不請求新框架，節省 CPU
                return;
            }

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            // 統一移動邏輯（鍵盤 + 觸控）
            if (keys.left) {
                playerX = Math.max(0, playerX - MOVE_SPEED * deltaTime);
            }
            if (keys.right) {
                playerX = Math.min(MAX_PLAYER_X, playerX + MOVE_SPEED * deltaTime);
            }
            // 使用 transform 代替 left，利用 GPU 加速避免重排
            const playerOffsetX = playerX - (CONTAINER_WIDTH - PLAYER_WIDTH) / 2;
            player.style.transform = `translateX(calc(-50% + ${playerOffsetX}px))`;

            // 更新氣泡位置
            updateBubbles(deltaTime);

            // 生成新氣泡（使用動態難度間隔）
            spawnTimer += deltaTime;
            const currentSpawnInterval = getCurrentSpawnInterval();
            if (spawnTimer >= currentSpawnInterval) {
                spawnBubble();
                spawnTimer = 0;
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // 更新氣泡位置與碰撞檢測
        function updateBubbles(deltaTime) {
            // 遊戲結束時停止處理氣泡，防止遊戲結束後還能得分
            if (!gameRunning) return;
            // 更新玩家邊界（相對於 gameContainer）
            playerLeft = playerX;
            playerRight = playerX + PLAYER_WIDTH;
            playerTop = CONTAINER_HEIGHT - GAME_CONFIG.PLAYER_BOTTOM - PLAYER_HEIGHT;
            playerBottom = CONTAINER_HEIGHT - GAME_CONFIG.PLAYER_BOTTOM;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                
                // 使用 deltaTime 保持速度一致
                bubble.y += bubble.speed * (deltaTime / 16);
                // 使用 transform 代替 top（效能更好，使用 GPU 加速）
                bubble.element.style.transform = `translateY(${bubble.y}px)`;

                // 簡化的碰撞檢測（使用預先計算的數值，避免 getBoundingClientRect）
                const bubbleBottom = bubble.y + BUBBLE_SIZE;
                const bubbleRight = bubble.x + BUBBLE_SIZE;

                if (bubbleBottom > playerTop &&
                    bubble.y < playerBottom &&
                    bubbleRight > playerLeft &&
                    bubble.x < playerRight) {
                    
                    if (bubble.isBad) {
                        handleDamage(); // 改為扣血而非直接結束
                        returnBubbleToPool(bubble.element);
                        bubbles.splice(i, 1);
                        continue; // 繼續檢查其他氣泡的碰撞
                    } else {
                        // 處理道具
                        if (bubble.isPowerup) {
                            activatePowerup(bubble.powerupType, bubble.x, bubble.y);
                            returnBubbleToPool(bubble.element);
                            bubbles.splice(i, 1);
                            continue;
                        }
                        
                        // 普通金幣
                        const points = activePowerups['2x'] ? GAME_CONFIG.COIN_2X_POINTS : GAME_CONFIG.COIN_BASE_POINTS;
                        score += points;
                        playSound('coin');
                        scoreDisplay.textContent = '分數: ' + formatScore(score);
                        // 更新難度顯示
                        updateDifficultyDisplay();
                        // 顯示分數彈出動畫
                        showScorePopup(bubble.x, bubble.y, points);
                        // 玩家動畫
                        triggerPlayerCatchAnimation();
                        returnBubbleToPool(bubble.element);
                        bubbles.splice(i, 1);
                    }
                }

                // 超出範圍
                if (bubble.y > CONTAINER_HEIGHT + BUBBLE_SIZE) {
                    returnBubbleToPool(bubble.element);
                    bubbles.splice(i, 1);
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            // 遊戲控制鍵需要阻止預設行為，防止網頁滾動
            const gameKeys = ['Enter', 'ArrowLeft', 'ArrowRight', 'Escape', 'a', 'A', 'd', 'D', ' '];
            if (gameKeys.includes(e.key)) {
                e.preventDefault();
            }
            
            // Enter 鍵開始/重新開始遊戲
            if (e.key === 'Enter') {
                if (!gameRunning) {
                    startGame();
                } else if (gameOver.style.display === 'flex') {
                    startGame();
                }
                return;
            }
            
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = true;
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = true;
            } else if (e.key === 'Escape') {
                togglePause();
            } else if (e.key === ' ') {
                // 空白鍵也可用於暫停
                togglePause();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = false;
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = false;
            }
        });

        // 切換暫停狀態
        function togglePause() {
            // 遊戲未開始、正在開始中、或遊戲已結束時不能暫停
            if (!gameRunning || isStarting) return;
            isPaused = !isPaused;
            pauseOverlay.style.display = isPaused ? 'flex' : 'none';
            
            // 暫停時更新顯示的分數和生命值
            if (isPaused) {
                pauseScore.textContent = '分數: ' + formatScore(score);
                let hearts = '';
                for (let i = 0; i < lives; i++) {
                    hearts += '❤️';
                }
                pauseLives.textContent = hearts;
            }
            
            if (!isPaused) {
                lastTime = performance.now(); // 重置 deltaTime
                // 恢復時重新啟動動畫循環
                animationFrameId = requestAnimationFrame(gameLoop);
            }
            // 暫停時取消當前的動畫框架，防止暫停期間堆疊調用
            else if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        // 觸控控制（統一使用 keys 系統，與鍵盤一致）
        function handleTouchStart(direction, e) {
            e.preventDefault();
            if (!gameRunning) return;
            if (direction === 'left') {
                keys.left = true;
            } else {
                keys.right = true;
            }
        }

        function handleTouchEnd(direction) {
            if (direction === 'left') {
                keys.left = false;
            } else {
                keys.right = false;
            }
        }

        // 左按鈕
        btnLeft.addEventListener('touchstart', (e) => handleTouchStart('left', e));
        btnLeft.addEventListener('touchend', () => handleTouchEnd('left'));
        btnLeft.addEventListener('mousedown', (e) => handleTouchStart('left', e));
        btnLeft.addEventListener('mouseup', () => handleTouchEnd('left'));
        btnLeft.addEventListener('mouseleave', () => handleTouchEnd('left'));

        // 右按鈕
        btnRight.addEventListener('touchstart', (e) => handleTouchStart('right', e));
        btnRight.addEventListener('touchend', () => handleTouchEnd('right'));
        btnRight.addEventListener('mousedown', (e) => handleTouchStart('right', e));
        btnRight.addEventListener('mouseup', () => handleTouchEnd('right'));
        btnRight.addEventListener('mouseleave', () => handleTouchEnd('right'));

        // 暫停按鈕
        btnPause.addEventListener('click', togglePause);
        btnPause.addEventListener('touchstart', (e) => {
            e.preventDefault();
            togglePause();
        });

        // ==================== 頁面可見性處理 (節省資源) ====================
        // 當分頁隱藏時自動暫停遊戲，返回時處理
        document.addEventListener('visibilitychange', () => {
            if (!gameRunning) return;
            
            if (document.hidden) {
                // 分頁隱藏時暫停遊戲（如果尚未暫停）
                if (!isPaused) {
                    isPaused = true;
                    pauseOverlay.style.display = 'flex';
                    pauseScore.textContent = '分數: ' + score;
                    let hearts = '';
                    for (let i = 0; i < lives; i++) {
                        hearts += '❤️';
                    }
                    pauseLives.textContent = hearts;
                    
                    // 取消動畫框架
                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                        animationFrameId = null;
                    }
                }
            } else {
                // 分頁恢復顯示時，重新啟動遊戲循環
                if (isPaused && gameRunning) {
                    lastTime = performance.now();
                    animationFrameId = requestAnimationFrame(gameLoop);
                }
            }
        });

        function startGame() {
            // 防止快速重複點擊
            if (isStarting) return;
            isStarting = true;
            
            // 確保之前的動畫框架已取消
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            gameRunning = true;
            isPaused = false;
            score = 0;
            lives = GAME_CONFIG.MAX_LIVES; // 重置生命值
            updateLivesDisplay(); // 更新生命值顯示
            
            // 重置道具狀態
            activePowerups = { shield: false, '2x': false };
            Object.values(powerupTimers).forEach(t => clearTimeout(t));
            powerupTimers = {};
            updatePowerupIndicator();
            player.classList.remove('player-invincible');
            isInvincible = false; // 重置無敵狀態
            invincibleReason = null; // 重置無敵原因
            
            // 先將舊氣泡返回物件池，再清空陣列
            bubbles.forEach(b => returnBubbleToPool(b.element));
            bubbles = [];
            playerX = (CONTAINER_WIDTH - PLAYER_WIDTH) / 2;
            keys.left = false;
            keys.right = false;
            spawnTimer = 0;
            lastTime = performance.now();
            // 使用 transform 初始化玩家位置
            player.style.transform = 'translateX(-50%)';
            player.classList.remove('player-catch');
            scoreDisplay.textContent = '分數: 0';
            updateDifficultyDisplay(); // 初始化難度顯示
            startBtn.style.display = 'none';
            gameOver.style.display = 'none';
            pauseOverlay.style.display = 'none';
            
            // 清除舊的彈出元素（氣泡已透過物件池處理）
            document.querySelectorAll('.score-popup').forEach(p => p.remove());
            document.querySelectorAll('.powerup-popup').forEach(p => p.remove());
            // 清除道具指示器殘留
            document.querySelectorAll('.powerup-badge').forEach(b => b.remove());

            // 使用 requestAnimationFrame 啟動遊戲循環
            playSound('start'); // 播放開始音效
            animationFrameId = requestAnimationFrame(gameLoop);
            
            // 短暫鎖定後解鎖
            setTimeout(() => { isStarting = false; }, GAME_CONFIG.START_LOCK_DURATION);
        }

        function spawnBubble() {
            if (!gameRunning) return;
            
            // 使用物件池取得 DOM 元素（效能優化）
            const bubble = getBubbleFromPool();
            const x = Math.random() * (CONTAINER_WIDTH - BUBBLE_SIZE);
            bubble.style.left = x + 'px';
            // 初始位置使用 transform（效能更好）
            bubble.style.transform = `translateY(${GAME_CONFIG.BUBBLE_START_Y}px)`;
            // 確保元素可見
            bubble.style.display = '';
            
            // 根據難度增加壞東西機率
            const badChance = Math.min(GAME_CONFIG.BAD_CHANCE_MAX, GAME_CONFIG.BAD_CHANCE_BASE + (getDifficultyLevel() * GAME_CONFIG.BAD_CHANCE_INCREASE));
            const isBad = Math.random() < badChance;
            
            // 道具機率生成（不在壞東西中）
            let isPowerup = false;
            let powerupType = null;
            if (!isBad && Math.random() < GAME_CONFIG.POWERUP_CHANCE) {
                isPowerup = true;
                powerupType = POWERUPS[Math.floor(Math.random() * POWERUPS.length)];
                bubble.textContent = powerupType.emoji;
            } else {
                bubble.textContent = isBad 
                    ? ITEM_EMOJIS.BAD[Math.floor(Math.random() * ITEM_EMOJIS.BAD.length)]
                    : ITEM_EMOJIS.GOOD[Math.floor(Math.random() * ITEM_EMOJIS.GOOD.length)];
            }
            
            gameContainer.appendChild(bubble);
            bubbles.push({ 
                element: bubble, 
                x: x,
                y: GAME_CONFIG.BUBBLE_START_Y, 
                speed: getCurrentBubbleSpeed(),
                isBad: isBad,
                isPowerup: isPowerup,
                powerupType: powerupType
            });
        }

        function endGame() {
            gameRunning = false;
            isPaused = false;
            playSound('gameover'); // 播放結束音效
            
            // 取消動畫框架防止記憶體洩漏
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            // 清除所有道具計時器，防止遊戲結束後計時器繼續運行
            Object.values(powerupTimers).forEach(t => clearTimeout(t));
            powerupTimers = {};
            
            // 重置無敵狀態
            isInvincible = false;
            
            // 隱藏暫停畫面
            pauseOverlay.style.display = 'none';
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('lobsterGameHighScore', highScore);
                highScoreDisplay.textContent = '🎉 新紀錄!: ' + formatScore(highScore);
            } else {
                highScoreDisplay.textContent = '最高分: ' + formatScore(highScore);
            }
            
            finalScore.textContent = '分數: ' + formatScore(score);
            gameOver.style.display = 'flex';
            
            // 清理所有氣泡（返回物件池）
            bubbles.forEach(b => returnBubbleToPool(b.element));
            bubbles = [];
            
            // 解鎖開始按鈕
            isStarting = false;
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 暫停/繼續按鈕
        resumeBtn.addEventListener('click', togglePause);
        
        // 音效開關
        soundBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundBtn.textContent = soundEnabled ? '🔊' : '🔇';
            localStorage.setItem(GAME_CONFIG.SOUND_ENABLED_KEY, soundEnabled);
        });
    </script>
</body>
