<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🦞 龍蝦大戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00d4ff;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 500px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            border: 3px solid #00d4ff;
            overflow: hidden;
        }
        #player {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 50px;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.1s;
        }
        .bubble {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 30px;
            will-change: transform; /* 硬體加速提示 */
        }
        @keyframes fall {
            0% { top: -40px; opacity: 1; }
            100% { top: 520px; opacity: 0; }
        }
        
        /* 分數彈出動畫 */
        .score-popup {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            animation: scoreFloat 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        
        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        
        /* 接到金幣時的玩家動畫 */
        @keyframes playerCatch {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        .player-catch {
            animation: playerCatch 0.2s ease-out;
        }
        
        /* 受傷震動動畫 */
        @keyframes damageShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); background: rgba(255,0,0,0.3); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
        
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
        #lives {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .life-lost {
            animation: lifeLost 0.5s ease-out;
        }
        @keyframes lifeLost {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 1.5rem;
            background: #00d4ff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
            transition: transform 0.2s;
        }
        #startBtn:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #gameOver h2 {
            font-size: 3rem;
            color: #ff6b6b;
        }
        #finalScore {
            font-size: 2rem;
            margin: 20px 0;
        }
        #highScore {
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 20px;
        }
        #restartBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #00d4ff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
        }
        #pauseOverlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        #pauseOverlay h2 {
            font-size: 3rem;
            color: #00d4ff;
            margin-bottom: 20px;
        }
        #resumeBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #00d4ff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
        }
        .instructions {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        /* 行動裝置觸控按鈕 */
        .touch-controls {
            display: none;
            margin-top: 20px;
            gap: 30px;
        }
        
        .touch-btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 212, 255, 0.3);
            border: 3px solid #00d4ff;
            border-radius: 50%;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: transform 0.1s, background 0.1s;
        }
        
        .touch-btn:active {
            transform: scale(0.9);
            background: rgba(0, 212, 255, 0.6);
        }
        
        /* 行動裝置適配 */
        @media (max-width: 850px) {
            #gameContainer {
                width: 95vw;
                height: 60vh;
                max-height: 500px;
            }
            h1 {
                font-size: 2rem;
            }
            .instructions {
                font-size: 1rem;
            }
            .touch-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <h1>🦞 龍蝦大戰</h1>
    <div id="gameContainer">
        <div id="score">分數: 0</div>
        <div id="lives">❤️❤️❤️</div>
        <div id="player">🦞</div>
        <button id="startBtn">開始遊戲</button>
        <div id="gameOver">
            <h2>遊戲結束!</h2>
            <div id="highScore">最高分: 0</div>
            <div id="finalScore">分數: 0</div>
            <button id="restartBtn">再玩一次</button>
        </div>
        <div id="pauseOverlay">
            <h2>暫停</h2>
            <button id="resumeBtn">繼續遊戲</button>
        </div>
    </div>
    <p class="instructions">← → 方向鍵移動龍蝦，接住掉落的金幣！💰 按 ESC 暫停</p>
    
    <!-- 行動裝置觸控按鈕 -->
    <div class="touch-controls">
        <div class="touch-btn" id="btnLeft">◀</div>
        <div class="touch-btn" id="btnRight">▶</div>
        <div class="touch-btn" id="btnPause">⏸</div>
    </div>

    <script>
        const player = document.getElementById('player');
        const gameContainer = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const gameOver = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const resumeBtn = document.getElementById('resumeBtn');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnPause = document.getElementById('btnPause');
        const livesDisplay = document.getElementById('lives');

        let playerX = (CONTAINER_WIDTH - PLAYER_WIDTH) / 2; // 玩家起始位置（居中）
        let score = 0;
        let lives = 3; // 生命值系統
        let highScore = parseInt(localStorage.getItem('lobsterGameHighScore')) || 0;
        
        // 初始化最高分顯示（頁面載入時就顯示 localStorage 的值）
        highScoreDisplay.textContent = '最高分: ' + highScore;
        
        let gameRunning = false;
        let isPaused = false;
        let bubbles = [];
        let lastTime = 0;
        let spawnTimer = 0;
        let animationFrameId = null;
        let isStarting = false; // 防止快速重複點擊
        let audioContext = null; // Web Audio API

        // 初始化音效系統
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }

        // 播放音效（使用 Web Audio API 生成簡單音效）
        function playSound(type) {
            try {
                const ctx = initAudio();
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                if (type === 'coin') {
                    // 接金幣：高音嗶聲
                    oscillator.frequency.setValueAtTime(880, ctx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.15);
                } else if (type === 'bomb') {
                    // 碰到炸彈：低音轟聲
                    oscillator.frequency.setValueAtTime(200, ctx.currentTime);
                    oscillator.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 0.3);
                    gainNode.gain.setValueAtTime(0.4, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    oscillator.start(ctx.currentTime);
                    oscillator.stop(ctx.currentTime + 0.3);
                }
            } catch (e) {
                // 音效失敗時靜默忽略
                console.log('音效播放失敗:', e);
            }
        }

        // 統一移動控制系統（使用遊戲循環 + deltaTime）
        const keys = { left: false, right: false };
        const MOVE_SPEED = 0.4; // 像素/毫秒

        // 預先計算玩家邊界（只計算一次）
        let playerLeft, playerRight, playerTop, playerBottom;
        const PLAYER_WIDTH = 60;
        const PLAYER_HEIGHT = 60;
        const CONTAINER_WIDTH = 800;
        const CONTAINER_HEIGHT = 500;
        const BUBBLE_SIZE = 40;
        const MAX_PLAYER_X = CONTAINER_WIDTH - PLAYER_WIDTH;

        // 難度系統參數
        const INITIAL_SPAWN_INTERVAL = 800; // 初始生成間隔 (ms)
        const MIN_SPAWN_INTERVAL = 300;      // 最小生成間隔 (ms)
        const INITIAL_BUBBLE_SPEED = 3;       // 初始氣泡速度
        const MAX_BUBBLE_SPEED = 8;           // 最大氣泡速度
        const DIFFICULTY_INCREASE_PER = 50;  // 每多少分數增加一次難度

        // 計算當前難度等級
        function getDifficultyLevel() {
            return Math.floor(score / DIFFICULTY_INCREASE_PER);
        }

        // 計算當前生成間隔
        function getCurrentSpawnInterval() {
            const level = getDifficultyLevel();
            return Math.max(MIN_SPAWN_INTERVAL, INITIAL_SPAWN_INTERVAL - (level * 50));
        }

        // 計算當前氣泡速度
        function getCurrentBubbleSpeed() {
            const level = getDifficultyLevel();
            return Math.min(MAX_BUBBLE_SPEED, INITIAL_BUBBLE_SPEED + (level * 0.5) + (Math.random() * 2));
        }

        const emojis = ['💰', '💎', '⭐', '🎵', '🎮'];
        const badEmojis = ['💣', '🔥', '👾'];

        // 顯示分數彈出動畫
        function showScorePopup(x, y, points) {
            const popup = document.createElement('div');
            popup.className = 'score-popup';
            popup.textContent = '+' + points;
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            gameContainer.appendChild(popup);
            
            // 動畫結束後移除元素
            setTimeout(() => popup.remove(), 800);
        }

        // 更新生命值顯示
        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < lives; i++) {
                hearts += '❤️';
            }
            livesDisplay.textContent = hearts;
        }

        // 玩家受傷時的動畫
        function triggerDamageAnimation() {
            gameContainer.style.animation = 'none';
            void gameContainer.offsetWidth; // 強制重繪
            gameContainer.style.animation = 'damageShake 0.5s ease-out';
        }

        // 碰到炸彈時的處理（扣血而非直接結束）
        function handleDamage() {
            playSound('bomb');
            lives--;
            updateLivesDisplay();
            
            // 受傷閃爍效果
            player.style.transition = 'opacity 0.1s';
            player.style.opacity = '0.3';
            setTimeout(() => {
                player.style.opacity = '1';
            }, 200);
            
            if (lives <= 0) {
                endGame();
            } else {
                // 短暫無敵時間
                gameRunning = false;
                setTimeout(() => {
                    if (lives > 0) {
                        gameRunning = true;
                        lastTime = performance.now();
                        animationFrameId = requestAnimationFrame(gameLoop);
                    }
                }, 1000);
            }
        }

        // 玩家接到物品時的動畫
        function triggerPlayerCatchAnimation() {
            player.classList.remove('player-catch');
            void player.offsetWidth; // 強制重繪
            player.classList.add('player-catch');
        }

        // 使用 requestAnimationFrame 替代 setInterval
        function gameLoop(timestamp) {
            if (!gameRunning) {
                return; // 遊戲結束，停止動畫循環
            }
            
            if (isPaused) {
                // 暫停時不請求新框架，節省 CPU
                return;
            }

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            // 統一移動邏輯（鍵盤 + 觸控）
            if (keys.left) {
                playerX = Math.max(0, playerX - MOVE_SPEED * deltaTime);
            }
            if (keys.right) {
                playerX = Math.min(MAX_PLAYER_X, playerX + MOVE_SPEED * deltaTime);
            }
            player.style.left = playerX + 'px';

            // 更新氣泡位置
            updateBubbles(deltaTime);

            // 生成新氣泡（使用動態難度間隔）
            spawnTimer += deltaTime;
            const currentSpawnInterval = getCurrentSpawnInterval();
            if (spawnTimer >= currentSpawnInterval) {
                spawnBubble();
                spawnTimer = 0;
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // 更新氣泡位置與碰撞檢測
        function updateBubbles(deltaTime) {
            // 更新玩家邊界（相對於 gameContainer）
            playerLeft = playerX;
            playerRight = playerX + PLAYER_WIDTH;
            playerTop = CONTAINER_HEIGHT - 20 - PLAYER_HEIGHT; // bottom: 20px
            playerBottom = CONTAINER_HEIGHT - 20;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                
                // 使用 deltaTime 保持速度一致
                bubble.y += bubble.speed * (deltaTime / 16);
                // 使用 transform 代替 top（效能更好，使用 GPU 加速）
                bubble.element.style.transform = `translateY(${bubble.y}px)`;

                // 簡化的碰撞檢測（使用預先計算的數值，避免 getBoundingClientRect）
                const bubbleBottom = bubble.y + BUBBLE_SIZE;
                const bubbleRight = bubble.x + BUBBLE_SIZE;

                if (bubbleBottom > playerTop &&
                    bubble.y < playerBottom &&
                    bubbleRight > playerLeft &&
                    bubble.x < playerRight) {
                    
                    if (bubble.isBad) {
                        handleDamage(); // 改為扣血而非直接結束
                        bubble.element.remove();
                        bubbles.splice(i, 1);
                        continue; // 繼續檢查其他氣泡的碰撞
                    } else {
                        score += 10;
                        playSound('coin');
                        scoreDisplay.textContent = '分數: ' + score;
                        // 顯示分數彈出動畫
                        showScorePopup(bubble.x, bubble.y, 10);
                        // 玩家動畫
                        triggerPlayerCatchAnimation();
                        bubble.element.remove();
                        bubbles.splice(i, 1);
                    }
                }

                // 超出範圍
                if (bubble.y > CONTAINER_HEIGHT + BUBBLE_SIZE) {
                    bubble.element.remove();
                    bubbles.splice(i, 1);
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            // Enter 鍵開始/重新開始遊戲
            if (e.key === 'Enter') {
                if (!gameRunning) {
                    startGame();
                } else if (gameOver.style.display === 'flex') {
                    startGame();
                }
                return;
            }
            
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = true;
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = true;
            } else if (e.key === 'Escape') {
                togglePause();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = false;
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = false;
            }
        });

        // 切換暫停狀態
        function togglePause() {
            if (!gameRunning || isStarting) return;
            isPaused = !isPaused;
            pauseOverlay.style.display = isPaused ? 'flex' : 'none';
            if (!isPaused) {
                lastTime = performance.now(); // 重置 deltaTime
                // 恢復時重新啟動動畫循環
                animationFrameId = requestAnimationFrame(gameLoop);
            }
            // 暫停時取消當前的動畫框架，防止暫停期間堆疊調用
            else if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        // 觸控控制（統一使用 keys 系統，與鍵盤一致）
        function handleTouchStart(direction, e) {
            e.preventDefault();
            if (!gameRunning) return;
            if (direction === 'left') {
                keys.left = true;
            } else {
                keys.right = true;
            }
        }

        function handleTouchEnd(direction) {
            if (direction === 'left') {
                keys.left = false;
            } else {
                keys.right = false;
            }
        }

        // 左按鈕
        btnLeft.addEventListener('touchstart', (e) => handleTouchStart('left', e));
        btnLeft.addEventListener('touchend', () => handleTouchEnd('left'));
        btnLeft.addEventListener('mousedown', (e) => handleTouchStart('left', e));
        btnLeft.addEventListener('mouseup', () => handleTouchEnd('left'));
        btnLeft.addEventListener('mouseleave', () => handleTouchEnd('left'));

        // 右按鈕
        btnRight.addEventListener('touchstart', (e) => handleTouchStart('right', e));
        btnRight.addEventListener('touchend', () => handleTouchEnd('right'));
        btnRight.addEventListener('mousedown', (e) => handleTouchStart('right', e));
        btnRight.addEventListener('mouseup', () => handleTouchEnd('right'));
        btnRight.addEventListener('mouseleave', () => handleTouchEnd('right'));

        // 暫停按鈕
        btnPause.addEventListener('click', togglePause);
        btnPause.addEventListener('touchstart', (e) => {
            e.preventDefault();
            togglePause();
        });

        function startGame() {
            // 防止快速重複點擊
            if (isStarting) return;
            isStarting = true;
            
            // 確保之前的動畫框架已取消
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            gameRunning = true;
            isPaused = false;
            score = 0;
            lives = 3; // 重置生命值
            updateLivesDisplay(); // 更新生命值顯示
            bubbles = [];
            playerX = (CONTAINER_WIDTH - PLAYER_WIDTH) / 2;
            keys.left = false;
            keys.right = false;
            spawnTimer = 0;
            lastTime = performance.now();
            player.style.left = playerX + 'px';
            player.classList.remove('player-catch');
            scoreDisplay.textContent = '分數: 0';
            startBtn.style.display = 'none';
            gameOver.style.display = 'none';
            pauseOverlay.style.display = 'none';
            
            // 清除舊的氣泡
            document.querySelectorAll('.bubble').forEach(b => b.remove());
            document.querySelectorAll('.score-popup').forEach(p => p.remove());

            // 使用 requestAnimationFrame 啟動遊戲循環
            animationFrameId = requestAnimationFrame(gameLoop);
            
            // 短暫鎖定後解鎖
            setTimeout(() => { isStarting = false; }, 500);
        }

        function spawnBubble() {
            if (!gameRunning) return;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const x = Math.random() * (CONTAINER_WIDTH - BUBBLE_SIZE);
            bubble.style.left = x + 'px';
            // 初始位置使用 transform（效能更好）
            bubble.style.transform = 'translateY(-40px)';
            
            // 根據難度增加壞東西機率 (最高 35%)
            const badChance = Math.min(0.35, 0.2 + (getDifficultyLevel() * 0.03));
            const isBad = Math.random() < badChance;
            bubble.textContent = isBad 
                ? badEmojis[Math.floor(Math.random() * badEmojis.length)]
                : emojis[Math.floor(Math.random() * emojis.length)];
            
            gameContainer.appendChild(bubble);
            bubbles.push({ 
                element: bubble, 
                x: x,
                y: -40, 
                speed: getCurrentBubbleSpeed(),
                isBad: isBad
            });
        }

        function endGame() {
            gameRunning = false;
            isPaused = false;
            
            // 取消動畫框架防止記憶體洩漏
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            // 隱藏暫停畫面
            pauseOverlay.style.display = 'none';
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('lobsterGameHighScore', highScore);
                highScoreDisplay.textContent = '🎉 最高分: ' + highScore;
            } else {
                highScoreDisplay.textContent = '最高分: ' + highScore;
            }
            
            finalScore.textContent = '分數: ' + score;
            gameOver.style.display = 'flex';
            
            // 清理所有氣泡
            bubbles.forEach(b => b.element.remove());
            bubbles = [];
            
            // 解鎖開始按鈕
            isStarting = false;
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 暫停/繼續按鈕
        resumeBtn.addEventListener('click', togglePause);
    </script>
</body>
</html>
