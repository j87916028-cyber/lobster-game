<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🦞 龍蝦大戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00d4ff;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 500px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            border: 3px solid #00d4ff;
            overflow: hidden;
        }
        #player {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 50px;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.1s;
        }
        .bubble {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 30px;
            animation: fall 3s linear;
        }
        @keyframes fall {
            0% { top: -40px; opacity: 1; }
            100% { top: 520px; opacity: 0; }
        }
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 1.5rem;
            background: #00d4ff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
            transition: transform 0.2s;
        }
        #startBtn:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #gameOver h2 {
            font-size: 3rem;
            color: #ff6b6b;
        }
        #finalScore {
            font-size: 2rem;
            margin: 20px 0;
        }
        #highScore {
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 20px;
        }
        #restartBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #00d4ff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
        }
        .instructions {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        /* 行動裝置觸控按鈕 */
        .touch-controls {
            display: none;
            margin-top: 20px;
            gap: 30px;
        }
        
        .touch-btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 212, 255, 0.3);
            border: 3px solid #00d4ff;
            border-radius: 50%;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            transition: transform 0.1s, background 0.1s;
        }
        
        .touch-btn:active {
            transform: scale(0.9);
            background: rgba(0, 212, 255, 0.6);
        }
        
        /* 行動裝置適配 */
        @media (max-width: 850px) {
            #gameContainer {
                width: 95vw;
                height: 60vh;
                max-height: 500px;
            }
            h1 {
                font-size: 2rem;
            }
            .instructions {
                font-size: 1rem;
            }
            .touch-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <h1>🦞 龍蝦大戰</h1>
    <div id="gameContainer">
        <div id="score">分數: 0</div>
        <div id="player">🦞</div>
        <button id="startBtn">開始遊戲</button>
        <div id="gameOver">
            <h2>遊戲結束!</h2>
            <div id="highScore">最高分: 0</div>
            <div id="finalScore">分數: 0</div>
            <button id="restartBtn">再玩一次</button>
        </div>
    </div>
    <p class="instructions">← → 方向鍵移動龍蝦，接住掉落的金幣！💰</p>
    
    <!-- 行動裝置觸控按鈕 -->
    <div class="touch-controls">
        <div class="touch-btn" id="btnLeft">◀</div>
        <div class="touch-btn" id="btnRight">▶</div>
    </div>

    <script>
        const player = document.getElementById('player');
        const gameContainer = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const gameOver = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');

        let playerX = 370;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('lobsterGameHighScore')) || 0;
        let gameRunning = false;
        let bubbles = [];
        let lastTime = 0;
        let spawnTimer = 0;

        // 預先計算玩家邊界（只計算一次）
        let playerLeft, playerRight, playerTop, playerBottom;
        const PLAYER_WIDTH = 60;
        const PLAYER_HEIGHT = 60;
        const CONTAINER_WIDTH = 800;
        const CONTAINER_HEIGHT = 500;
        const BUBBLE_SIZE = 40;

        const emojis = ['💰', '💎', '⭐', '🎵', '🎮'];
        const badEmojis = ['💣', '🔥', '👾'];

        // 使用 requestAnimationFrame 替代 setInterval
        function gameLoop(timestamp) {
            if (!gameRunning) return;

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            // 更新氣泡位置
            updateBubbles(deltaTime);

            // 生成新氣泡
            spawnTimer += deltaTime;
            if (spawnTimer >= 800) {
                spawnBubble();
                spawnTimer = 0;
            }

            requestAnimationFrame(gameLoop);
        }

        // 更新氣泡位置與碰撞檢測
        function updateBubbles(deltaTime) {
            // 更新玩家邊界（相對於 gameContainer）
            playerLeft = playerX;
            playerRight = playerX + PLAYER_WIDTH;
            playerTop = CONTAINER_HEIGHT - 20 - PLAYER_HEIGHT; // bottom: 20px
            playerBottom = CONTAINER_HEIGHT - 20;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                
                // 使用 deltaTime 保持速度一致
                bubble.y += bubble.speed * (deltaTime / 16);
                bubble.element.style.top = bubble.y + 'px';

                // 簡化的碰撞檢測（使用預先計算的數值，避免 getBoundingClientRect）
                const bubbleBottom = bubble.y + BUBBLE_SIZE;
                const bubbleRight = bubble.x + BUBBLE_SIZE;

                if (bubbleBottom > playerTop &&
                    bubble.y < playerBottom &&
                    bubbleRight > playerLeft &&
                    bubble.x < playerRight) {
                    
                    if (bubble.isBad) {
                        endGame();
                        return;
                    } else {
                        score += 10;
                        scoreDisplay.textContent = '分數: ' + score;
                        bubble.element.remove();
                        bubbles.splice(i, 1);
                    }
                }

                // 超出範圍
                if (bubble.y > CONTAINER_HEIGHT + BUBBLE_SIZE) {
                    bubble.element.remove();
                    bubbles.splice(i, 1);
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                playerX = Math.max(0, playerX - 30);
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                playerX = Math.min(740, playerX + 30);
            }
            player.style.left = playerX + 'px';
        });

        // 觸控控制
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        let touchInterval = null;

        function handleTouchStart(direction) {
            if (!gameRunning) return;
            // 立即移動一次
            if (direction === 'left') {
                playerX = Math.max(0, playerX - 30);
            } else {
                playerX = Math.min(740, playerX + 30);
            }
            player.style.left = playerX + 'px';
            
            // 長按時持續移動
            touchInterval = setInterval(() => {
                if (direction === 'left') {
                    playerX = Math.max(0, playerX - 30);
                } else {
                    playerX = Math.min(740, playerX + 30);
                }
                player.style.left = playerX + 'px';
            }, 100);
        }

        function handleTouchEnd() {
            if (touchInterval) {
                clearInterval(touchInterval);
                touchInterval = null;
            }
        }

        // 左按鈕
        btnLeft.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTouchStart('left');
        });
        btnLeft.addEventListener('touchend', handleTouchEnd);
        btnLeft.addEventListener('mousedown', () => handleTouchStart('left'));
        btnLeft.addEventListener('mouseup', handleTouchEnd);
        btnLeft.addEventListener('mouseleave', handleTouchEnd);

        // 右按鈕
        btnRight.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTouchStart('right');
        });
        btnRight.addEventListener('touchend', handleTouchEnd);
        btnRight.addEventListener('mousedown', () => handleTouchStart('right'));
        btnRight.addEventListener('mouseup', handleTouchEnd);
        btnRight.addEventListener('mouseleave', handleTouchEnd);

        function startGame() {
            gameRunning = true;
            score = 0;
            bubbles = [];
            playerX = 370;
            spawnTimer = 0;
            lastTime = performance.now();
            player.style.left = playerX + 'px';
            scoreDisplay.textContent = '分數: 0';
            startBtn.style.display = 'none';
            gameOver.style.display = 'none';
            
            // 清除舊的氣泡
            document.querySelectorAll('.bubble').forEach(b => b.remove());

            // 使用 requestAnimationFrame 啟動遊戲循環
            requestAnimationFrame(gameLoop);
        }

        function spawnBubble() {
            if (!gameRunning) return;
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const x = Math.random() * (CONTAINER_WIDTH - BUBBLE_SIZE);
            bubble.style.left = x + 'px';
            bubble.style.top = '-40px';
            
            // 80% 好東西，20% 壞東西
            const isBad = Math.random() < 0.2;
            bubble.textContent = isBad 
                ? badEmojis[Math.floor(Math.random() * badEmojis.length)]
                : emojis[Math.floor(Math.random() * emojis.length)];
            
            gameContainer.appendChild(bubble);
            bubbles.push({ 
                element: bubble, 
                x: x,
                y: -40, 
                speed: 3 + Math.random() * 3,
                isBad: isBad
            });
        }

        function endGame() {
            gameRunning = false;
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('lobsterGameHighScore', highScore);
                highScoreDisplay.textContent = '🎉 最高分: ' + highScore;
            } else {
                highScoreDisplay.textContent = '最高分: ' + highScore;
            }
            
            finalScore.textContent = '分數: ' + score;
            gameOver.style.display = 'flex';
            
            // 清理所有氣泡
            bubbles.forEach(b => b.element.remove());
            bubbles = [];
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
