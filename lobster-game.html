<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🦞 龍蝦大戰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00d4ff;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 500px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            border: 3px solid #00d4ff;
            overflow: hidden;
            contain: strict; /* CSS contain 屬性：隔離內容渲染，提升效能 */
        }
        #player {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 50px;
            bottom: 20px;
            left: 50%;
            will-change: transform; /* GPU 加速提示 */
        }
        .bubble {
            position: absolute;
            width: 40px;
            height: 40px;
            font-size: 30px;
            will-change: transform; /* 硬體加速提示 */
        }
        @keyframes fall {
            0% { top: -40px; opacity: 1; }
            100% { top: 520px; opacity: 0; }
        }
        
        /* 分數彈出動畫 */
        .score-popup {
            position: absolute;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            animation: scoreFloat 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        
        @keyframes scoreFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }
        
        /* 接到金幣時的玩家動畫 */
        @keyframes playerCatch {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        .player-catch {
            animation: playerCatch 0.2s ease-out;
        }
        
        /* 受傷震動動畫 */
        @keyframes damageShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); background: rgba(255,0,0,0.3); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }
        
        /* 無敵時間閃爍效果 */
        @keyframes invincible {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px gold); }
            50% { opacity: 0.5; filter: drop-shadow(0 0 15px gold); }
        }
        
        .player-invincible {
            animation: invincible 0.25s infinite;
        }
        
        /* 道具效果指示器 */
        #powerupIndicator {
            position: absolute;
            top: 60px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 10;
        }
        
        #difficultyIndicator {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 15px;
            color: #00d4ff;
            z-index: 10;
        }

        #fpsDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 10px;
            color: #00ff88;
            z-index: 10;
            font-family: monospace;
            opacity: 0.7;
        }
        
        /* 距離最高分差距顯示 */
        #highScoreGap {
            position: absolute;
            top: 45px;
            right: 20px;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 10px;
            z-index: 10;
            font-family: monospace;
            opacity: 0.7;
            transition: color 0.3s;
        }
        
        #highScoreGap.behind {
            color: #ff6b6b;
        }
        
        #highScoreGap.ahead {
            color: #00ff88;
        }
        
        #highScoreGap.record {
            color: #ffd700;
            animation: recordPulse 0.5s infinite alternate;
        }
        
        @keyframes recordPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        
        #comboIndicator {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff6b6b, #ffd700, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        
        #comboIndicator.show {
            opacity: 1;
            animation: comboPulse 0.5s infinite;
        }
        
        @keyframes comboPulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
        }
        
        .powerup-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            animation: powerupPulse 0.5s infinite alternate;
        }
        
        .powerup-shield {
            background: rgba(0, 191, 255, 0.8);
            box-shadow: 0 0 10px #00bfff;
        }
        
        .powerup-2x {
            background: rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 10px #ffd700;
        }
        
        /* 新紀錄慶祝動畫 */
        .new-record {
            animation: recordCelebrate 0.5s ease-out;
        }
        
        @keyframes recordCelebrate {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        
        /* 遊戲結束畫面 */
        #gameOver {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
        }
        
        #gameOver h2 {
            font-size: 3rem;
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b;
            margin-bottom: 20px;
        }
        
        @keyframes powerupPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        
        /* 道具彈出動畫 */
        .powerup-popup {
            position: absolute;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 10px;
            animation: powerupFloat 1s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }
        
        @keyframes powerupFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.2); }
        }
        
        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
        #lives {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .life-lost {
            animation: lifeLost 0.5s ease-out;
        }
        @keyframes lifeLost {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            font-size: 1.5rem;
            background: #00d4ff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
            transition: transform 0.2s;
        }
        #startBtn:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #gameOver h2 {
            font-size: 3rem;
            color: #ff6b6b;
        }
        #finalScore {
            font-size: 2rem;
            margin: 20px 0;
        }
        #highScore {
            font-size: 1.2rem;
            color: #ffd700;
            margin-bottom: 20px;
        }
        #gameStatsEnd {
            display: flex;
            gap: 15px;
            font-size: 1rem;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }
        #gameStatsEnd span {
            color: #00d4ff;
        }
        #restartBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #00d4ff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
        }
        #pauseOverlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        #pauseOverlay h2 {
            font-size: 3rem;
            color: #00d4ff;
            margin-bottom: 20px;
        }
        #pauseScore {
            font-size: 1.5rem;
            color: #ffd700;
            margin-bottom: 10px;
        }
        #pauseLives {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        #gameStats {
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        #gameStats span {
            display: inline-block;
            margin: 0 8px;
        }
        
        #resumeBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #00d4ff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
            margin-top: 15px;
        }
        
        #menuBtn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #ff6b6b;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            margin-top: 10px;
        }
        
        #menuBtn:hover {
            background: #ff5252;
        }
        .instructions {
            margin-top: 20px;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        /* 行動裝置觸控按鈕 */
        .touch-controls {
            display: none;
            margin-top: 20px;
            gap: 30px;
        }
        
        .touch-btn {
            width: 80px;
            height: 80px;
            background: rgba(0, 212, 255, 0.3);
            border: 3px solid #00d4ff;
            border-radius: 50%;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none; /* 防止 iOS 長按彈出菜單 */
            touch-action: manipulation;
            transition: transform 0.1s, background 0.1s;
            -webkit-tap-highlight-color: transparent; /* 移除點擊高亮 */
        }
        
        /* 禁用雙擊縮放 */
        * {
            touch-action: manipulation;
        }
        
        .touch-btn:active {
            transform: scale(0.9);
            background: rgba(0, 212, 255, 0.6);
        }
        
        /* 音效開關按鈕 */
        #soundBtn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            padding: 8px 15px;
            transition: transform 0.2s;
            z-index: 10;
        }
        #soundBtn:hover {
            transform: scale(1.1);
        }
        
        /* 暫停按鈕 */
        #pauseBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            background: rgba(0,0,0,0.5);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            padding: 8px 15px;
            transition: transform 0.2s;
            z-index: 10;
        }
        #pauseBtn:hover {
            transform: scale(1.1);
        }
        
        /* 行動裝置適配 */
        @media (max-width: 850px) {
            #gameContainer {
                width: 95vw;
                height: 60vh;
                max-height: 500px;
            }
            h1 {
                font-size: 2rem;
            }
            .instructions {
                font-size: 1rem;
            }
            .touch-controls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <h1>🦞 龍蝦大戰</h1>
    <div id="gameContainer">
        <div id="score">分數: 0</div>
        <button id="soundBtn" title="音效開關">🔊</button>
        <button id="pauseBtn" title="暫停 (ESC)">⏸️</button>
        <div id="lives">❤️❤️❤️</div>
        <div id="powerupIndicator"></div>
        <div id="difficultyIndicator">難度 1</div>
        <div id="fpsDisplay">FPS: --</div>
        <div id="highScoreGap"></div>
        <div id="comboIndicator"></div>
        <div id="player">🦞</div>
        <button id="startBtn">開始遊戲</button>
        <div id="gameOver">
            <h2>遊戲結束!</h2>
            <div id="highScore">最高分: 0</div>
            <div id="finalScore">分數: 0</div>
            <div id="gameStatsEnd">
                <span>⏱️ <span id="statTimeEnd">0:00</span></span>
                <span>💰 <span id="statCoinsEnd">0</span></span>
                <span>💣 <span id="statBombsEnd">0</span></span>
            </div>
            <button id="restartBtn">再玩一次</button>
        </div>
        <div id="pauseOverlay">
            <h2>暫停</h2>
            <div id="pauseScore">分數: 0</div>
            <div id="pauseLives">❤️❤️❤️</div>
            <div id="gameStats">
                <span>⏱️ <span id="statTime">0:00</span></span>
                <span>💰 <span id="statCoins">0</span></span>
                <span>💣 <span id="statBombs">0</span></span>
            </div>
            <button id="resumeBtn">繼續遊戲</button>
            <button id="menuBtn">返回選單</button>
        </div>
    </div>
    <p class="instructions">← → 方向鍵移動龍蝦，接住掉落的金幣！💰 按 ESC/P 暫停 | M 靜音切換</p>
    
    <!-- 行動裝置觸控按鈕 -->
    <div class="touch-controls">
        <div class="touch-btn" id="btnLeft">◀</div>
        <div class="touch-btn" id="btnRight">▶</div>
        <div class="touch-btn" id="btnPause">⏸</div>
    </div>

    <script>
        // ==================== 遊戲配置常數 ====================
        const GAME_CONFIG = {
            // 遊戲容器尺寸
            CONTAINER_WIDTH: 800,
            CONTAINER_HEIGHT: 500,
            
            // 玩家尺寸
            PLAYER_WIDTH: 60,
            PLAYER_HEIGHT: 60,
            PLAYER_BOTTOM: 20,           // 玩家距離底部的距離
            PLAYER_MOVE_SPEED: 0.4,     // 移動速度 (像素/毫秒)
            
            // 氣泡/物品
            BUBBLE_SIZE: 40,
            BUBBLE_START_Y: -40,
            
            // 生命值
            MAX_LIVES: 3,
            MAX_LIVES_CAP: 5,            // 吃到愛心道具的上限
            INVINCIBLE_DURATION: 1000,  // 受傷後無敵時間 (ms)
            
            // 分數
            COIN_BASE_POINTS: 10,       // 普通金幣基礎分數
            COIN_2X_POINTS: 20,         // 雙倍分數
            
            // 難度系統
            INITIAL_SPAWN_INTERVAL: 800,
            MIN_SPAWN_INTERVAL: 300,
            INITIAL_BUBBLE_SPEED: 3,
            MAX_BUBBLE_SPEED: 8,
            DIFFICULTY_INCREASE_PER: 50,
            SPAWN_DECREASE_PER_LEVEL: 50,
            SPEED_INCREASE_PER_LEVEL: 0.5,
            BAD_CHANCE_BASE: 0.2,
            BAD_CHANCE_MAX: 0.35,
            BAD_CHANCE_INCREASE: 0.03,
            POWERUP_CHANCE: 0.1,
            
            // 道具持續時間
            SHIELD_DURATION: 5000,
            DOUBLE_DURATION: 8000,
            
            // 動畫時間
            SCORE_POPUP_DURATION: 800,
            PLAYER_CATCH_DURATION: 200,
            DAMAGE_SHAKE_DURATION: 500,
            LIFE_LOST_DURATION: 500,
            START_LOCK_DURATION: 500,
            
            // 本地存儲鍵名
            HIGH_SCORE_KEY: 'lobsterGameHighScore',
            SOUND_ENABLED_KEY: 'lobsterGameSoundEnabled'
        };
        
        const ITEM_EMOJIS = {
            GOOD: ['💰', '💎', '⭐', '🎵', '🎮'],
            BAD: ['💣', '🔥', '👾']
        };
        
        const POWERUPS = [
            { emoji: '🛡️', type: 'shield', duration: GAME_CONFIG.SHIELD_DURATION, name: '護盾' },
            { emoji: '🌟', type: '2x', duration: GAME_CONFIG.DOUBLE_DURATION, name: '雙倍' },
            { emoji: '❤️', type: 'heart', duration: 0, name: '生命+1' }
        ];

        // ==================== DOM 元素 ====================
        const player = document.getElementById('player');
        const gameContainer = document.getElementById('gameContainer');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        const gameOver = document.getElementById('gameOver');
        const finalScore = document.getElementById('finalScore');
        const highScoreDisplay = document.getElementById('highScore');
        const restartBtn = document.getElementById('restartBtn');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const resumeBtn = document.getElementById('resumeBtn');
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnPause = document.getElementById('btnPause');
        const livesDisplay = document.getElementById('lives');
        const soundBtn = document.getElementById('soundBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const pauseScore = document.getElementById('pauseScore');
        const pauseLives = document.getElementById('pauseLives');
        const statTime = document.getElementById('statTime');
        const statCoins = document.getElementById('statCoins');
        const statBombs = document.getElementById('statBombs');
        const menuBtn = document.getElementById('menuBtn');
        // 遊戲結束畫面的統計數據元素
        const statTimeEnd = document.getElementById('statTimeEnd');
        const statCoinsEnd = document.getElementById('statCoinsEnd');
        const statBombsEnd = document.getElementById('statBombsEnd');

        // 動態獲取遊戲容器尺寸（支援 RWD 響應式設計）
        function getGameDimensions() {
            const rect = gameContainer.getBoundingClientRect();
            return { width: rect.width, height: rect.height };
        }

        // 安全處理 localStorage（私人瀏覽模式可能會拋出錯誤）
        function getStorageItem(key, defaultValue = null) {
            try {
                const value = localStorage.getItem(key);
                return value !== null ? value : defaultValue;
            } catch (e) {
                // 私人瀏覽模式下靜默失敗
                return defaultValue;
            }
        }

        function setStorageItem(key, value) {
            try {
                localStorage.setItem(key, value);
                return true;
            } catch (e) {
                // 私人瀏覽模式下靜默失敗
                return false;
            }
        }

        let playerX = 0; // 初始化為 0，startGame 時會正確設置
        let score = 0;
        let lives = GAME_CONFIG.MAX_LIVES;
        let highScore = parseInt(getStorageItem(GAME_CONFIG.HIGH_SCORE_KEY, '0')) || 0;
        
        // 初始化最高分顯示（頁面載入時就顯示 localStorage 的值）
        highScoreDisplay.textContent = '最高分: ' + formatScore(highScore);
        
        let gameRunning = false;
        let isPaused = false;
        let pausedByVisibility = false; // 追蹤是否因分頁隱藏而暫停
        let bubbles = [];
        let lastTime = 0;
        let spawnTimer = 0;
        let animationFrameId = null;
        let isStarting = false; // 防止快速重複點擊

        // FPS 計算變數
        let fps = 0;
        let frameCount = 0;
        let fpsLastTime = 0;
        const fpsDisplay = document.getElementById('fpsDisplay');
        const highScoreGapDisplay = document.getElementById('highScoreGap');
        let audioContext = null; // Web Audio API
        
        // 遊戲統計數據
        let gameStats = {
            coinsCollected: 0,
            bombsHit: 0,
            startTime: 0,
            elapsedTime: 0
        };
        
        // 連擊系統
        let comboCount = 0;
        let comboTimeout = null;
        let comboMultiplier = 1;
        const COMBO_WINDOW = 1500; // 連擊有效時間 (ms)
        const MAX_COMBO_MULTIPLIER = 5; // 最大連擊倍數
        const comboIndicator = document.getElementById('comboIndicator');

        // 無敵時間計時器（修復：儲存計時器以便清除）
        let invincibleTimeout = null;

        // 倒數計時相關變數（用於防止記憶體洩漏）
        let countdownInterval = null;
        let countdownOverlay = null;

        // ==================== 統一遊戲清理函數 ====================
        // 統一處理遊戲結束/重啟時的清理工作，避免重複代碼
        function cleanupGame(resetState = true) {
            // 取消動畫框架防止記憶體洩漏
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            // 清除所有道具計時器
            Object.values(powerupTimers).forEach(t => clearTimeout(t));
            powerupTimers = {};
            
            // 清除連擊計時器和無敵計時器
            if (comboTimeout) {
                clearTimeout(comboTimeout);
                comboTimeout = null;
            }
            if (invincibleTimeout) {
                clearTimeout(invincibleTimeout);
                invincibleTimeout = null;
            }
            
            // 清除倒數計時（防止記憶體洩漏）
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            if (countdownOverlay) {
                countdownOverlay.remove();
                countdownOverlay = null;
            }
            
            // 清理所有氣泡（從 DOM 移除並返回池中）
            bubbles.forEach(b => {
                b.element.remove(); // 從 DOM 中移除
                returnBubbleToPool(b.element);
            });
            bubbles = [];
            
            // 清理所有彈出元素
            document.querySelectorAll('.score-popup, .powerup-popup').forEach(p => {
                p.remove();
                returnPopupToPool(p);
            });
            
            // 清除道具指示器殘留
            document.querySelectorAll('.powerup-badge').forEach(b => b.remove());
            
            // 重置生成計時器
            spawnTimer = 0;
            
            if (resetState) {
                // 重置遊戲狀態
                isInvincible = false;
                invincibleReason = null;
                pausedByVisibility = false;
                resetCombo();
                
                // 重置道具狀態
                activePowerups = { shield: false, '2x': false };
                updatePowerupIndicator();
                player.classList.remove('player-invincible', 'player-catch');
                
                // 重置玩家位置
                player.style.transform = 'translateX(-50%)';
            }
        }

        // ==================== DOM 元素物件池 (效能優化) ====================
        // 重用 DOM 元素，避免頻繁創建/刪除導致的效能損耗
        const bubblePool = [];
        const POOL_MAX_SIZE = 30; // 池的最大大小
        
        // 彈出動畫元素物件池（分數彈出、道具彈出）
        const popupPool = [];
        const POPUP_POOL_MAX_SIZE = 15; // 彈出池的最大大小

        // 從池中取得氣泡元素，或創建新的
        function getBubbleFromPool() {
            if (bubblePool.length > 0) {
                const element = bubblePool.pop();
                return element;
            }
            const element = document.createElement('div');
            element.className = 'bubble';
            return element;
        }

        // 將氣泡元素返回池中
        function returnBubbleToPool(element) {
            // 清除元素內容和樣式
            element.textContent = '';
            element.style.left = '';
            element.style.transform = '';
            element.style.display = '';
            
            if (bubblePool.length < POOL_MAX_SIZE) {
                bubblePool.push(element);
            } else {
                // 池滿時直接移除
                element.remove();
            }
        }
        
        // 從池中取得彈出動畫元素，或創建新的
        function getPopupFromPool(className) {
            if (popupPool.length > 0) {
                const element = popupPool.pop();
                element.className = className;
                return element;
            }
            const element = document.createElement('div');
            element.className = className;
            return element;
        }
        
        // 將彈出動畫元素返回池中
        function returnPopupToPool(element) {
            // 清除元素內容和樣式
            element.textContent = '';
            element.style.left = '';
            element.style.top = '';
            element.style.background = '';
            element.style.display = '';
            
            if (popupPool.length < POPUP_POOL_MAX_SIZE) {
                popupPool.push(element);
            } else {
                // 池滿時直接移除
                element.remove();
            }
        }
        
        // 音效開關（從本地存儲讀取設置，預設為開啟）
        let soundEnabled = getStorageItem(GAME_CONFIG.SOUND_ENABLED_KEY, 'true') !== 'false';
        soundBtn.textContent = soundEnabled ? '🔊' : '🔇';

        // 初始化音效系統
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }

        // 播放單一頻率音調（通用輔助函數）
        function playTone(startFreq, endFreq, duration, volume = 0.3) {
            const ctx = initAudio();
            if (ctx.state === 'suspended') ctx.resume();
            
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            oscillator.frequency.setValueAtTime(startFreq, ctx.currentTime);
            if (endFreq !== startFreq) {
                oscillator.frequency.exponentialRampToValueAtTime(endFreq, ctx.currentTime + duration);
            }
            gainNode.gain.setValueAtTime(volume, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
            
            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + duration);
        }

        // 播放多音符音調（用於愛心等複雜音效）
        function playMultiTone(notes, duration, volume = 0.3) {
            const ctx = initAudio();
            if (ctx.state === 'suspended') ctx.resume();
            
            notes.forEach((freq, i) => {
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                const startTime = ctx.currentTime + (i * duration / notes.length);
                oscillator.frequency.setValueAtTime(freq, startTime);
                gainNode.gain.setValueAtTime(volume, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + (duration / notes.length));
                
                oscillator.start(startTime);
                oscillator.stop(startTime + (duration / notes.length));
            });
        }

        // 播放音效（使用 Web Audio API 生成簡單音效）
        function playSound(type) {
            // 音效關閉時跳過
            if (!soundEnabled) return;
            
            try {
                switch (type) {
                    case 'coin':
                        // 接金幣：高音嗶聲
                        playTone(880, 1760, 0.15, 0.3);
                        break;
                    case 'combo':
                        // 連擊音效：急促上升
                        playTone(600, 1200, 0.1, 0.2);
                        break;
                    case 'bomb':
                        // 碰到炸彈：低音轟聲
                        playTone(200, 50, 0.3, 0.4);
                        break;
                    case 'start':
                        // 遊戲開始：上升音調
                        playTone(440, 880, 0.25, 0.3);
                        break;
                    case 'gameover':
                        // 遊戲結束：下降音調
                        playTone(440, 110, 0.5, 0.3);
                        break;
                    case 'powerup':
                        // 取得道具：上升音調（快）
                        playTone(523, 1047, 0.2, 0.25);
                        break;
                    case 'heart':
                        // 取得愛心：兩個音符上揚
                        playMultiTone([659, 880], 0.25, 0.3);
                        break;
                }
            } catch (e) {
                // 音效失敗時靜默忽略（避免 console.log 影響效能）
            }
        }

        // 統一移動控制系統（使用遊戲循環 + deltaTime）
        const keys = { left: false, right: false };
        const MOVE_SPEED = GAME_CONFIG.PLAYER_MOVE_SPEED; // 像素/毫秒

        // 遊戲邊界（動態計算，支援 RWD）
        let PLAYER_LEFT_BOUND = 0;
        let PLAYER_RIGHT_BOUND = GAME_CONFIG.CONTAINER_WIDTH - GAME_CONFIG.PLAYER_WIDTH;
        let PLAYER_TOP_BOUND = GAME_CONFIG.CONTAINER_HEIGHT - GAME_CONFIG.PLAYER_BOTTOM - GAME_CONFIG.PLAYER_HEIGHT;
        let PLAYER_BOTTOM_BOUND = GAME_CONFIG.CONTAINER_HEIGHT - GAME_CONFIG.PLAYER_BOTTOM;
        let cachedGameHeight = GAME_CONFIG.CONTAINER_HEIGHT; // 緩存遊戲高度（效能優化）
        let cachedGameWidth = GAME_CONFIG.CONTAINER_WIDTH; // 緩存遊戲寬度（效能優化：避免 spawnBubble 中重複調用 getGameDimensions）
        let PLAYER_CENTER_OFFSET = PLAYER_RIGHT_BOUND / 2; // 預先計算的玩家中心偏移量（效能優化）

        // 更新遊戲邊界（調用時機：遊戲開始、窗口大小變化）
        function updateGameBounds() {
            const dims = getGameDimensions();
            PLAYER_LEFT_BOUND = 0;
            PLAYER_RIGHT_BOUND = dims.width - GAME_CONFIG.PLAYER_WIDTH;
            PLAYER_TOP_BOUND = dims.height - GAME_CONFIG.PLAYER_BOTTOM - GAME_CONFIG.PLAYER_HEIGHT;
            PLAYER_BOTTOM_BOUND = dims.height - GAME_CONFIG.PLAYER_BOTTOM;
            cachedGameHeight = dims.height; // 緩存高度，避免每幀調用 getBoundingClientRect
            cachedGameWidth = dims.width; // 緩存寬度，避免 spawnBubble 中重複調用 getGameDimensions
            PLAYER_CENTER_OFFSET = PLAYER_RIGHT_BOUND / 2; // 更新預先計算的中心偏移量
        }

        // 難度系統參數（使用 GAME_CONFIG 中的值）
        const DIFFICULTY_INCREASE_PER = GAME_CONFIG.DIFFICULTY_INCREASE_PER;
        
        // 從 GAME_CONFIG 提取常用難度參數（避免重複查閱）
        const MIN_SPAWN_INTERVAL = GAME_CONFIG.MIN_SPAWN_INTERVAL;
        const MAX_BUBBLE_SPEED = GAME_CONFIG.MAX_BUBBLE_SPEED;
        const INITIAL_SPAWN_INTERVAL = GAME_CONFIG.INITIAL_SPAWN_INTERVAL;
        const INITIAL_BUBBLE_SPEED = GAME_CONFIG.INITIAL_BUBBLE_SPEED;

        // 計算當前難度等級
        function getDifficultyLevel() {
            return Math.floor(score / DIFFICULTY_INCREASE_PER);
        }

        // 計算當前生成間隔
        function getCurrentSpawnInterval() {
            const level = getDifficultyLevel();
            return Math.max(MIN_SPAWN_INTERVAL, INITIAL_SPAWN_INTERVAL - (level * GAME_CONFIG.SPAWN_DECREASE_PER_LEVEL));
        }

        // 計算當前氣泡速度
        function getCurrentBubbleSpeed() {
            const level = getDifficultyLevel();
            return Math.min(MAX_BUBBLE_SPEED, INITIAL_BUBBLE_SPEED + (level * GAME_CONFIG.SPEED_INCREASE_PER_LEVEL) + (Math.random() * 2));
        }
        
        // 道具狀態
        let activePowerups = {
            shield: false,
            '2x': false
        };
        let powerupTimers = {};

        // 格式化分數顯示（千分位）
        function formatScore(num) {
            return num.toLocaleString('zh-TW');
        }
        
        // 連擊系統函數
        function handleCombo() {
            // 清除之前的計時器
            if (comboTimeout) clearTimeout(comboTimeout);
            
            comboCount++;
            // 計算連擊倍數 (每3個連擊+1倍，上限5倍)
            comboMultiplier = Math.min(MAX_COMBO_MULTIPLIER, 1 + Math.floor(comboCount / 3));
            
            // 更新連擊顯示
            if (comboCount >= 2) {
                comboIndicator.textContent = `🔥 ${comboCount} 連擊! x${comboMultiplier}`;
                comboIndicator.classList.add('show');
                // 播放連擊音效
                playSound('combo');
            }
            
            // 設置連擊超時
            comboTimeout = setTimeout(() => {
                resetCombo();
            }, COMBO_WINDOW);
        }
        
        // 重置連擊
        function resetCombo() {
            comboCount = 0;
            comboMultiplier = 1;
            comboIndicator.classList.remove('show');
            if (comboTimeout) clearTimeout(comboTimeout);
            comboTimeout = null;
        }
        
        // 生成愛心字符串（共用函數，避免重複代碼）
        function getHeartsString(count) {
            return '❤️'.repeat(Math.max(0, count));
        }
        
        // 格式化時間顯示（分:秒）
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return mins + ':' + secs.toString().padStart(2, '0');
        }
        
        // 更新遊戲統計顯示
        function updateStatsDisplay() {
            statTime.textContent = formatTime(gameStats.elapsedTime);
            statCoins.textContent = gameStats.coinsCollected;
            statBombs.textContent = gameStats.bombsHit;
        }

        // 顯示分數彈出動畫
        function showScorePopup(x, y, points, customText) {
            const popup = getPopupFromPool('score-popup');
            popup.textContent = customText || '+' + formatScore(points);
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            gameContainer.appendChild(popup);
            
            // 動畫結束後返回池中
            setTimeout(() => {
                popup.remove();
                returnPopupToPool(popup);
            }, GAME_CONFIG.SCORE_POPUP_DURATION);
        }

        // 更新生命值顯示
        function updateLivesDisplay() {
            livesDisplay.textContent = getHeartsString(lives);
            
            // 生命值減少時觸發動畫
            if (lives < GAME_CONFIG.MAX_LIVES) {
                livesDisplay.classList.add('life-lost');
                setTimeout(() => livesDisplay.classList.remove('life-lost'), GAME_CONFIG.LIFE_LOST_DURATION);
            }
        }

        // 更新難度等級顯示
        function updateDifficultyDisplay() {
            const difficultyIndicator = document.getElementById('difficultyIndicator');
            const level = getDifficultyLevel();
            difficultyIndicator.textContent = '難度 ' + (level + 1);
            
            // 難度提升時的視覺效果
            if (level > 0) {
                difficultyIndicator.style.color = level >= 5 ? '#ff6b6b' : level >= 3 ? '#ffd700' : '#00d4ff';
            }
        }

        // 更新最高分差距顯示
        function updateHighScoreGapDisplay() {
            if (!gameRunning || highScore === 0) {
                highScoreGapDisplay.textContent = '';
                highScoreGapDisplay.className = '';
                return;
            }
            
            const diff = score - highScore;
            if (diff > 0) {
                // 創新紀錄
                highScoreGapDisplay.textContent = '🏆 +' + formatScore(diff);
                highScoreGapDisplay.className = 'record';
            } else if (diff < 0) {
                // 落後
                highScoreGapDisplay.textContent = '📍 ' + formatScore(diff);
                highScoreGapDisplay.className = 'behind';
            } else {
                // 平手
                highScoreGapDisplay.textContent = '⭐ 並列';
                highScoreGapDisplay.className = 'ahead';
            }
        }

        // 玩家受傷時的動畫
        function triggerDamageAnimation() {
            gameContainer.style.animation = 'none';
            void gameContainer.offsetWidth; // 強制重繪
            gameContainer.style.animation = `damageShake ${GAME_CONFIG.DAMAGE_SHAKE_DURATION}ms ease-out`;
        }

        // 碰到炸彈時的處理（扣血而非直接結束）
        let isInvincible = false; // 無敵狀態標誌
        let invincibleReason = null; // 無敵原因: 'damage' | 'shield' | null

        function handleDamage() {
            // 無敵時間內不再受傷
            if (isInvincible) return;
            
            playSound('bomb');
            triggerDamageAnimation(); // 受傷時觸發畫面震動動畫
            lives--;
            updateLivesDisplay();
            
            // 重置連擊（受到傷害時中斷連擊）
            resetCombo();
            
            // 更新受到炸彈攻擊統計
            gameStats.bombsHit++;
            
            // 無敵時間閃爍效果
            player.classList.add('player-invincible');
            isInvincible = true;
            invincibleReason = 'damage';
            
            if (lives <= 0) {
                player.classList.remove('player-invincible');
                isInvincible = false;
                invincibleReason = null;
                endGame();
            } else {
                // 無敵時間 1 秒，遊戲繼續進行（修復：儲存計時器以便清除）
                if (invincibleTimeout) clearTimeout(invincibleTimeout);
                invincibleTimeout = setTimeout(() => {
                    if (lives > 0) {
                        player.classList.remove('player-invincible');
                        isInvincible = false;
                        invincibleReason = null;
                    }
                }, GAME_CONFIG.INVINCIBLE_DURATION);
            }
        }

        // 玩家接到物品時的動畫
        function triggerPlayerCatchAnimation() {
            player.classList.remove('player-catch');
            void player.offsetWidth; // 強制重繪
            player.classList.add('player-catch');
        }

        // 啟動道具效果
        function activatePowerup(powerup, x, y) {
            // 根據道具類型播放不同音效
            if (powerup.type === 'heart') {
                playSound('heart');
            } else {
                playSound('powerup');
            }
            
            // 顯示道具彈出動畫（使用物件池）
            const popup = getPopupFromPool('powerup-popup');
            popup.textContent = powerup.name + '！';
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            popup.style.background = powerup.type === 'shield' ? 'rgba(0,191,255,0.8)' : 
                                      powerup.type === '2x' ? 'rgba(255,215,0,0.8)' : 'rgba(255,0,0,0.8)';
            gameContainer.appendChild(popup);
            setTimeout(() => {
                popup.remove();
                returnPopupToPool(popup);
            }, GAME_CONFIG.SCORE_POPUP_DURATION);
            
            // 處理不同道具效果
            if (powerup.type === 'shield') {
                activePowerups.shield = true;
                isInvincible = true;
                invincibleReason = 'shield'; // 設置無敵原因為護盾
                player.classList.add('player-invincible');
                updatePowerupIndicator();
                
                // 清除之前的計時器
                if (powerupTimers.shield) clearTimeout(powerupTimers.shield);
                powerupTimers.shield = setTimeout(() => {
                    activePowerups.shield = false;
                    // 只移除護盾造成的無敵，不影響受傷無敵狀態
                    if (invincibleReason === 'shield') {
                        isInvincible = false;
                        invincibleReason = null;
                        player.classList.remove('player-invincible');
                    }
                    // 如果同時處於受傷無敵狀態，保留無敵效果
                    else if (invincibleReason === 'damage') {
                        // 保持受傷無敵狀態，什麼都不做
                    }
                    updatePowerupIndicator();
                }, powerup.duration);
            } 
            else if (powerup.type === '2x') {
                activePowerups['2x'] = true;
                updatePowerupIndicator();
                
                // 清除之前的計時器
                if (powerupTimers['2x']) clearTimeout(powerupTimers['2x']);
                powerupTimers['2x'] = setTimeout(() => {
                    activePowerups['2x'] = false;
                    updatePowerupIndicator();
                }, powerup.duration);
            }
            else if (powerup.type === 'heart') {
                if (lives < GAME_CONFIG.MAX_LIVES_CAP) {
                    lives++;
                    updateLivesDisplay();
                }
            }
        }

        // 更新道具指示器顯示
        function updatePowerupIndicator() {
            const indicator = document.getElementById('powerupIndicator');
            indicator.innerHTML = '';
            
            if (activePowerups.shield) {
                const badge = document.createElement('div');
                badge.className = 'powerup-badge powerup-shield';
                badge.textContent = '🛡️ 護盾';
                indicator.appendChild(badge);
            }
            if (activePowerups['2x']) {
                const badge = document.createElement('div');
                badge.className = 'powerup-badge powerup-2x';
                badge.textContent = '🌟 雙倍';
                indicator.appendChild(badge);
            }
        }

        // 使用 requestAnimationFrame 替代 setInterval
        function gameLoop(timestamp) {
            if (!gameRunning) {
                return; // 遊戲結束，停止動畫循環
            }
            
            if (isPaused) {
                // 暫停時不請求新框架，節省 CPU
                return;
            }

            // FPS 計算：每秒更新一次
            frameCount++;
            if (timestamp - fpsLastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                fpsLastTime = timestamp;
                fpsDisplay.textContent = 'FPS: ' + fps;
            }

            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;
            
            // 更新遊戲時間統計
            gameStats.elapsedTime = (Date.now() - gameStats.startTime) / 1000;

            // 統一移動邏輯（鍵盤 + 觸控），使用動態邊界
            if (keys.left) {
                playerX = Math.max(PLAYER_LEFT_BOUND, playerX - MOVE_SPEED * deltaTime);
            }
            if (keys.right) {
                playerX = Math.min(PLAYER_RIGHT_BOUND, playerX + MOVE_SPEED * deltaTime);
            }
            // 使用 transform 代替 left，利用 GPU 加速避免重排
            const playerOffsetX = playerX - PLAYER_CENTER_OFFSET;
            player.style.transform = `translateX(calc(-50% + ${playerOffsetX}px))`;

            // 更新氣泡位置
            updateBubbles(deltaTime);

            // 生成新氣泡（使用動態難度間隔）
            spawnTimer += deltaTime;
            const currentSpawnInterval = getCurrentSpawnInterval();
            if (spawnTimer >= currentSpawnInterval) {
                spawnBubble();
                spawnTimer = 0;
            }

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // 更新氣泡位置與碰撞檢測
        function updateBubbles(deltaTime) {
            // 遊戲結束時停止處理氣泡，防止遊戲結束後還能得分
            if (!gameRunning) return;
            
            // 效能優化：使用緩存的游戏高度，避免每幀調用 getBoundingClientRect
            const gameHeight = cachedGameHeight;
            
            // 使用預先計算的固定邊界值（效能優化）
            const playerLeft = playerX;
            const playerRight = playerX + GAME_CONFIG.PLAYER_WIDTH;

            for (let i = bubbles.length - 1; i >= 0; i--) {
                const bubble = bubbles[i];
                
                // 使用 deltaTime 保持速度一致
                bubble.y += bubble.speed * (deltaTime / 16);
                // 使用 transform 代替 top（效能更好，使用 GPU 加速）
                bubble.element.style.transform = `translateY(${bubble.y}px)`;

                // 簡化的碰撞檢測（使用預先計算的數值，避免 getBoundingClientRect）
                const bubbleBottom = bubble.y + GAME_CONFIG.BUBBLE_SIZE;
                const bubbleRight = bubble.x + GAME_CONFIG.BUBBLE_SIZE;

                if (bubbleBottom > PLAYER_TOP_BOUND &&
                    bubble.y < PLAYER_BOTTOM_BOUND &&
                    bubbleRight > playerLeft &&
                    bubble.x < playerRight) {
                    
                    if (bubble.isBad) {
                        handleDamage(); // 改為扣血而非直接結束
                        returnBubbleToPool(bubble.element);
                        bubbles.splice(i, 1);
                        continue; // 繼續檢查其他氣泡的碰撞
                    } else {
                        // 處理道具
                        if (bubble.isPowerup) {
                            activatePowerup(bubble.powerupType, bubble.x, bubble.y);
                            returnBubbleToPool(bubble.element);
                            bubbles.splice(i, 1);
                            continue;
                        }
                        
                        // 普通金幣
                        const basePoints = activePowerups['2x'] ? GAME_CONFIG.COIN_2X_POINTS : GAME_CONFIG.COIN_BASE_POINTS;
                        // 觸發連擊系統
                        handleCombo();
                        const points = basePoints * comboMultiplier;
                        score += points;
                        playSound('coin');
                        scoreDisplay.textContent = '分數: ' + formatScore(score);
                        // 更新難度顯示
                        updateDifficultyDisplay();
                        // 更新最高分差距顯示
                        updateHighScoreGapDisplay();
                        // 更新收集金幣統計
                        gameStats.coinsCollected++;
                        // 顯示分數彈出動畫（顯示連擊加成）
                        const popupText = comboCount >= 2 ? `+${formatScore(points)} (x${comboMultiplier})` : '+' + formatScore(points);
                        showScorePopup(bubble.x, bubble.y, points, popupText);
                        // 玩家動畫
                        triggerPlayerCatchAnimation();
                        returnBubbleToPool(bubble.element);
                        bubbles.splice(i, 1);
                    }
                }

                // 超出範圍（使用緩存的游戏高度）
                if (bubble.y > gameHeight + GAME_CONFIG.BUBBLE_SIZE) {
                    returnBubbleToPool(bubble.element);
                    bubbles.splice(i, 1);
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            // 遊戲控制鍵需要阻止預設行為，防止網頁滾動
            const gameKeys = ['Enter', 'ArrowLeft', 'ArrowRight', 'Escape', 'a', 'A', 'd', 'D', ' '];
            if (gameKeys.includes(e.key)) {
                e.preventDefault();
            }
            
            // Enter 鍵開始/重新開始遊戲
            if (e.key === 'Enter') {
                if (!gameRunning) {
                    startGame();
                } else if (gameOver.style.display === 'flex') {
                    startGame();
                }
                return;
            }
            
            if (!gameRunning) return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = true;
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = true;
            } else if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
                togglePause();
            } else if (e.key === 'm' || e.key === 'M') {
                // M 鍵切換靜音
                soundEnabled = !soundEnabled;
                soundBtn.textContent = soundEnabled ? '🔊' : '🔇';
                setStorageItem(GAME_CONFIG.SOUND_ENABLED_KEY, soundEnabled);
            } else if (e.key === ' ') {
                // 空白鍵也可用於暫停
                togglePause();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keys.left = false;
            } else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keys.right = false;
            }
        });

        // 切換暫停狀態
        function togglePause() {
            // 遊戲未開始、正在開始中、或遊戲已結束時不能暫停
            if (!gameRunning || isStarting) return;
            isPaused = !isPaused;
            pauseOverlay.style.display = isPaused ? 'flex' : 'none';
            
            // 暫停時更新顯示的分數和生命值
            if (isPaused) {
                pauseScore.textContent = '分數: ' + formatScore(score);
                pauseLives.textContent = getHeartsString(lives);
                updateStatsDisplay(); // 更新遊戲統計顯示
            }
            
            if (!isPaused) {
                lastTime = performance.now(); // 重置 deltaTime
                // 恢復時重新啟動動畫循環
                animationFrameId = requestAnimationFrame(gameLoop);
            }
            // 暫停時取消當前的動畫框架，防止暫停期間堆疊調用
            else if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        // 觸控控制（統一使用 keys 系統，與鍵盤一致）
        // 防呆機制：防止同時觸發觸控和滑鼠事件
        let isTouching = false;
        let touchTimeout = null;
        
        function handleTouchStart(direction, e) {
            e.preventDefault();
            // 防止觸控和滑鼠事件同時觸發
            if (e.type === 'touchstart') {
                isTouching = true;
                // 短暫延遲後重置標誌，確保滑鼠事件不會被誤觸發
                if (touchTimeout) clearTimeout(touchTimeout);
            } else if (e.type === 'mousedown' && isTouching) {
                // 如果正在觸控中，忽略滑鼠事件
                return;
            }
            if (!gameRunning) return;
            if (direction === 'left') {
                keys.left = true;
            } else {
                keys.right = true;
            }
        }

        function handleTouchEnd(direction) {
            // 重置觸控標誌，允許後續的滑鼠事件
            if (direction === 'left' || direction === 'right') {
                if (touchTimeout) clearTimeout(touchTimeout);
                touchTimeout = setTimeout(() => { isTouching = false; }, 100);
            }
            if (direction === 'left') {
                keys.left = false;
            } else {
                keys.right = false;
            }
        }

        // 左按鈕 - 添加 touchcancel 處理防止觸控中斷時按鍵卡住，並使用被動监听器優化效能
        btnLeft.addEventListener('touchstart', (e) => handleTouchStart('left', e), { passive: false });
        btnLeft.addEventListener('touchend', () => handleTouchEnd('left'));
        btnLeft.addEventListener('touchcancel', () => handleTouchEnd('left')); // 觸控中斷時重置
        btnLeft.addEventListener('mousedown', (e) => handleTouchStart('left', e));
        btnLeft.addEventListener('mouseup', () => handleTouchEnd('left'));
        btnLeft.addEventListener('mouseleave', () => handleTouchEnd('left'));

        // 右按鈕
        btnRight.addEventListener('touchstart', (e) => handleTouchStart('right', e), { passive: false });
        btnRight.addEventListener('touchend', () => handleTouchEnd('right'));
        btnRight.addEventListener('touchcancel', () => handleTouchEnd('right')); // 觸控中斷時重置
        btnRight.addEventListener('mousedown', (e) => handleTouchStart('right', e));
        btnRight.addEventListener('mouseup', () => handleTouchEnd('right'));
        btnRight.addEventListener('mouseleave', () => handleTouchEnd('right'));

        // 暫停按鈕
        btnPause.addEventListener('click', togglePause);
        btnPause.addEventListener('touchstart', (e) => {
            e.preventDefault();
            togglePause();
        });

        // ==================== 頁面可見性處理 (節省資源) ====================
        document.addEventListener('visibilitychange', () => {
            if (!gameRunning) return;
            
            if (document.hidden) {
                // 分頁隱藏時暫停遊戲（如果尚未暫停）
                if (!isPaused) {
                    isPaused = true;
                    pausedByVisibility = true;
                    pauseOverlay.style.display = 'flex';
                    pauseScore.textContent = '分數: ' + score;
                    pauseLives.textContent = getHeartsString(lives);
                    
                    // 取消動畫框架
                    if (animationFrameId) {
                        cancelAnimationFrame(animationFrameId);
                        animationFrameId = null;
                    }
                }
            } else {
                // 分頁恢復顯示時，只有因為分頁隱藏而暫停時才恢復
                // 如果是用戶手動暫停的，保持暫停狀態
                if (pausedByVisibility && gameRunning) {
                    isPaused = false;
                    pausedByVisibility = false;
                    pauseOverlay.style.display = 'none';
                    lastTime = performance.now();
                    animationFrameId = requestAnimationFrame(gameLoop);
                }
            }
        });

        // 窗口大小變化時更新遊戲邊界（支援 RWD）
        window.addEventListener('resize', () => {
            if (gameRunning) {
                updateGameBounds();
                // 確保玩家不會跑出邊界
                playerX = Math.max(PLAYER_LEFT_BOUND, Math.min(PLAYER_RIGHT_BOUND, playerX));
            }
        });

        // ==================== 視窗焦點處理 ====================
        // 當視窗失去焦點時重置按鍵狀態，防止鍵盤卡住
        window.addEventListener('blur', () => {
            keys.left = false;
            keys.right = false;
        });

        // 顯示倒數計時（遊戲開始前）
        function showCountdown(callback) {
            // 使用全域變數儲存倒數計時相關元素，以便正確清理
            countdownOverlay = document.createElement('div');
            countdownOverlay.id = 'countdownOverlay';
            countdownOverlay.style.cssText = `
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.7);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 100;
                font-size: 5rem;
                font-weight: bold;
                color: #00d4ff;
                text-shadow: 0 0 30px #00d4ff;
            `;
            gameContainer.appendChild(countdownOverlay);
            
            let count = 3;
            countdownOverlay.textContent = count;
            
            countdownInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownOverlay.textContent = count;
                    playTone(440, 440, 0.15, 0.2); // 倒數音效
                } else {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    countdownOverlay.remove();
                    countdownOverlay = null;
                    playTone(880, 1760, 0.25, 0.3); // 開始音效
                    callback(); // 啟動遊戲
                }
            }, 1000);
        }

        function startGame() {
            // 防止快速重複點擊
            if (isStarting) return;
            
            // 初始化 FPS 計算
            frameCount = 0;
            fpsLastTime = performance.now();
            fpsDisplay.textContent = 'FPS: --';
            
            // 初始化最高分差距顯示
            updateHighScoreGapDisplay();
            
            // 使用統一清理函數（重置遊戲狀態）
            cleanupGame(true);
            
            isStarting = true;
            
            gameRunning = true;
            isPaused = false;
            score = 0;
            lives = GAME_CONFIG.MAX_LIVES; // 重置生命值
            updateLivesDisplay(); // 更新生命值顯示
            
            // 重置遊戲統計
            gameStats = {
                coinsCollected: 0,
                bombsHit: 0,
                startTime: Date.now(),
                elapsedTime: 0
            };
            
            // 重置道具狀態
            activePowerups = { shield: false, '2x': false };
            Object.values(powerupTimers).forEach(t => clearTimeout(t));
            powerupTimers = {};
            updatePowerupIndicator();
            player.classList.remove('player-invincible');
            isInvincible = false; // 重置無敵狀態
            invincibleReason = null; // 重置無敵原因
            pausedByVisibility = false; // 重置可見性暫停狀態
            
            // 重置連擊系統
            resetCombo();
            
            // 更新遊戲邊界（支援 RWD）
            updateGameBounds();
            // 使用緩存的寬度初始化玩家位置（置中）
            playerX = (cachedGameWidth - GAME_CONFIG.PLAYER_WIDTH) / 2;
            keys.left = false;
            keys.right = false;
            spawnTimer = 0;
            lastTime = performance.now();
            // 使用 transform 初始化玩家位置
            player.style.transform = 'translateX(-50%)';
            player.classList.remove('player-catch');
            scoreDisplay.textContent = '分數: 0';
            updateDifficultyDisplay(); // 初始化難度顯示
            startBtn.style.display = 'none';
            gameOver.style.display = 'none';
            pauseOverlay.style.display = 'none';
            
            // 顯示倒數計時，然後啟動遊戲
            showCountdown(() => {
                isStarting = false;
                animationFrameId = requestAnimationFrame(gameLoop);
            });
            
            // 短暫鎖定後解鎖（但倒數期間不解鎖）
        }

        function spawnBubble() {
            if (!gameRunning) return;
            
            // 使用物件池取得 DOM 元素（效能優化），使用緩存的寬度避免重複 DOM 佈局計算
            const bubble = getBubbleFromPool();
            const x = Math.random() * (cachedGameWidth - GAME_CONFIG.BUBBLE_SIZE);
            bubble.style.left = x + 'px';
            // 初始位置使用 transform（效能更好）
            bubble.style.transform = `translateY(${GAME_CONFIG.BUBBLE_START_Y}px)`;
            // 確保元素可見
            bubble.style.display = '';
            
            // 根據難度增加壞東西機率
            const badChance = Math.min(GAME_CONFIG.BAD_CHANCE_MAX, GAME_CONFIG.BAD_CHANCE_BASE + (getDifficultyLevel() * GAME_CONFIG.BAD_CHANCE_INCREASE));
            const isBad = Math.random() < badChance;
            
            // 道具機率生成（不在壞東西中）
            let isPowerup = false;
            let powerupType = null;
            if (!isBad && Math.random() < GAME_CONFIG.POWERUP_CHANCE) {
                isPowerup = true;
                powerupType = POWERUPS[Math.floor(Math.random() * POWERUPS.length)];
                bubble.textContent = powerupType.emoji;
            } else {
                bubble.textContent = isBad 
                    ? ITEM_EMOJIS.BAD[Math.floor(Math.random() * ITEM_EMOJIS.BAD.length)]
                    : ITEM_EMOJIS.GOOD[Math.floor(Math.random() * ITEM_EMOJIS.GOOD.length)];
            }
            
            gameContainer.appendChild(bubble);
            bubbles.push({ 
                element: bubble, 
                x: x,
                y: GAME_CONFIG.BUBBLE_START_Y, 
                speed: getCurrentBubbleSpeed(),
                isBad: isBad,
                isPowerup: isPowerup,
                powerupType: powerupType
            });
        }

        function endGame() {
            gameRunning = false;
            isPaused = false;
            playSound('gameover'); // 播放結束音效
            
            // 使用統一清理函數（不重置遊戲狀態，只清理資源）
            cleanupGame(false);
            
            // 隱藏暫停畫面
            pauseOverlay.style.display = 'none';
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                setStorageItem(GAME_CONFIG.HIGH_SCORE_KEY, highScore);
                highScoreDisplay.textContent = '🎉 新紀錄!: ' + formatScore(highScore);
                // 添加慶祝動畫
                highScoreDisplay.classList.add('new-record');
                setTimeout(() => highScoreDisplay.classList.remove('new-record'), 500);
            } else {
                highScoreDisplay.textContent = '最高分: ' + formatScore(highScore);
            }
            
            finalScore.textContent = '分數: ' + formatScore(score);
            
            // 更新遊戲結束畫面的統計數據
            statTimeEnd.textContent = formatTime(gameStats.elapsedTime);
            statCoinsEnd.textContent = gameStats.coinsCollected;
            statBombsEnd.textContent = gameStats.bombsHit;
            
            gameOver.style.display = 'flex';
            
            // 解鎖開始按鈕
            isStarting = false;
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // 暫停/繼續按鈕
        resumeBtn.addEventListener('click', togglePause);
        
        // 返回選單按鈕
        menuBtn.addEventListener('click', () => {
            // 停止遊戲並返回選單
            gameRunning = false;
            isPaused = false;
            
            // 使用統一清理函數（重置遊戲狀態）
            cleanupGame(true);
            
            // 隱藏所有遊戲 UI
            pauseOverlay.style.display = 'none';
            gameOver.style.display = 'none';
            
            // 顯示開始按鈕
            startBtn.style.display = '';
            
            // 更新分數顯示
            scoreDisplay.textContent = '分數: 0';
            updateLivesDisplay();
        });
        
        // 音效開關
        soundBtn.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundBtn.textContent = soundEnabled ? '🔊' : '🔇';
            setStorageItem(GAME_CONFIG.SOUND_ENABLED_KEY, soundEnabled);
        });
        
        // 暫停按鈕
        pauseBtn.addEventListener('click', togglePause);
    </script>
</body>
</html>
