<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 龍蝦大冒險 - 收集金幣買裝備！</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            overflow-x: hidden;
            user-select: none;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00;
            text-align: center;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { text-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00; }
            to { text-shadow: 0 0 50px #ffd700, 0 0 100px #ff8c00, 0 0 150px #ff4500; }
        }
        .stats {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
            padding: 10px 20px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid rgba(255,215,0,0.5);
        }
        .stat-icon { font-size: 1.5rem; }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            background: linear-gradient(to bottom, #1e90ff 0%, #00bfff 30%, #90ee90 50%, #228b22 80%, #006400 100%);
            border-radius: 25px;
            border: 5px solid #ffd700;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(255, 215, 0, 0.4), inset 0 0 100px rgba(0,0,0,0.3);
        }
        #player {
            position: absolute;
            width: 80px;
            height: 80px;
            font-size: 65px;
            bottom: 85px;
            left: 360px;
            transition: left 0.05s linear;
            z-index: 10;
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.4));
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .bouncing { animation: bounce 0.5s ease infinite; }
        #ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 75px;
            background: linear-gradient(to bottom, #32cd32, #228b22, #006400);
            border-top: 8px solid #7cfc00;
        }
        .item {
            position: absolute;
            font-size: 40px;
            animation: fall linear forwards;cursor: default;
            z-index: 5;
        }
        @keyframes fall {
            0% { transform: rotate(0deg) scale(1); opacity: 1; }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); opacity: 0.8; }
        }
        @keyframes collect {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        .collected { animation: collect 0.3s ease forwards !important; }
        .combo-text {
            position: absolute;
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px #000;
            animation: comboAnim 0.8s ease forwards;
            z-index: 100;
        }
        @keyframes comboAnim {
            0% { transform: scale(0.5); opacity: 1; }
            50% { transform: scale(1.5); }
            100% { transform: scale(1) translateY(-50px); opacity: 0; }
        }
        #menu, #shop, #leaderboard {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            overflow-y: auto;
        }
        #shop, #leaderboard { display: none; }
        .menu-title {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ffd700, #ff8c00, #ff4500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .menu-btn {
            padding: 18px 50px;
            font-size: 1.4rem;
            margin: 10px;
            background: linear-gradient(45deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: #1a1a2e;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }
        .menu-btn:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 10px 40px rgba(255,215,0,0.6);
        }
        .menu-btn.secondary {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            box-shadow: 0 5px 20px rgba(0,212,255,0.4);
        }
        .menu-btn.shop {
            background: linear-gradient(45deg, #ff6b6b, #ee5a5a);
            box-shadow: 0 5px 20px rgba(255,107,107,0.4);
        }
        .closeBtn {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2.5rem;
            cursor: pointer;
            color: white;
            transition: transform 0.3s;
        }
        .closeBtn:hover { transform: rotate(90deg) scale(1.2); }
        #shopItems {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 15px;
            max-width: 90%;
        }
        .shopItem {
            background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .shopItem:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
        }
        .shopItem .icon { font-size: 3rem; margin-bottom: 5px; }
        .shopItem .name { font-size: 0.9rem; margin: 5px 0; }
        .shopItem .price { color: #ffd700; font-weight: bold; }
        .shopItem .owned { color: #00ff00; font-size: 0.8rem; margin-top: 5px; }
        .shopItem.maxed { opacity: 0.5; }
        .level-indicator {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 1.2rem;
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
        }
        .lives-display {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
        }
        .combo-display {
            position: absolute;
            top: 50px;
            right: 15px;
            font-size: 1rem;
            color: #ffd700;
            font-weight: bold;
        }
        .instructions {
            margin-top: 15px;
            font-size: 1rem;
            opacity: 0.8;
            text-align: center;
            padding: 0 20px;
        }
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 20px;
        }
        .mobile-btn {
            width: 80px;
            height: 80px;
            font-size: 2rem;
            background: rgba(255,255,255,0.2);
            border: 2px solid #ffd700;
            border-radius: 50%;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .mobile-controls { display: flex; }
            #gameContainer { height: 400px; }
            .stats { font-size: 1rem; }
            h1 { font-size: 1.8rem; }
            #shopItems { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <h1>🦞 龍蝦大冒險</h1>
    <div class="stats">
        <div class="stat"><span class="stat-icon">💰</span> <span id="coins">0</span></div>
        <div class="stat"><span class="stat-icon">🏆</span> <span id="highScore">0</span></div>
        <div class="stat"><span class="stat-icon">🔥</span> 連擊 <span id="combo">0</span></div>
    </div>
    <div id="gameContainer">
        <div class="level-indicator">關卡 <span id="level">1</span></div>
        <div class="lives-display" id="lives">❤️❤️❤️</div>
        <div class="combo-display" id="comboDisplay"></div>
        <div id="player">🦞</div>
        <div id="ground"></div>
        <div id="menu">
            <div class="menu-title">🦞 龍蝦大冒險</div>
            <button class="menu-btn" onclick="startGame()">🎮 開始遊戲</button>
            <button class="menu-btn shop" onclick="openShop()">🏪 商店</button>
            <button class="menu-btn secondary" onclick="openLeaderboard()">📊 排行榜</button>
        </div>
        <div id="shop">
            <span class="closeBtn" onclick="closeShop()">✕</span>
            <h2 style="color: #ffd700;">🏪 商店</h2>
            <p>💰 金幣: <span id="shopCoins">0</span></p>
            <div id="shopItems"></div>
        </div>
        <div id="leaderboard">
            <span class="closeBtn" onclick="closeLeaderboard()">✕</span>
            <h2 style="color: #ffd700;">📊 排行榜</h2>
            <div id="leaderboardList"></div>
        </div>
    </div>
    <p class="instructions">電腦：← → 鍵 / 手機：觸控螢幕左右移動<br>接金幣💰避開炸彈💣！</p>
    <div class="mobile-controls">
        <button class="mobile-btn" ontouchstart="moveLeft()">⬅️</button>
        <button class="mobile-btn" ontouchstart="moveRight()">➡️</button>
    </div>

    <script>
        // ===== 遊戲狀態 =====
        let gameState = {
            coins: parseInt(localStorage.getItem('lobsterCoins') || '0'),
            highScore: parseInt(localStorage.getItem('lobsterHighScore') || '0'),
            inventory: JSON.parse(localStorage.getItem('lobsterInventory') || '{}')
        };
        
        const shopItems = [
            { id: 'speed', name: '⚡ 速度', price: 100, maxLevel: 10, desc: '移動更快' },
            { id: 'magnet', name: '🧲 磁鐵', price: 200, maxLevel: 5, desc: '自動吸取' },
            { id: 'shield', name: '🛡️ 護盾', price: 300, maxLevel: 5, desc: '擋住炸彈' },
            { id: 'multi', name: '✖️ 2倍', price: 500, maxLevel: 5, desc: '雙倍金幣' },
            { id: 'life', name: '❤️ 生命', price: 150, maxLevel: 10, desc: '額外生命' },
            { id: 'x2score', name: '🎯 2倍分', price: 800, maxLevel: 5, desc: '雙倍分數' }
        ];
        
        let playerX = 360;
        let score = 0;
        let gameRunning = false;
        let items = [];
        let gameLoop, spawnLoop;
        let currentLevel = 1;
        let lives = 3;
        let combo = 0;
        let comboTimer = null;
        let lastCollectTime = 0;
        
        const player = document.getElementById('player');
        const gameContainer = document.getElementById('gameContainer');
        
        document.getElementById('coins').textContent = gameState.coins;
        document.getElementById('highScore').textContent = gameState.highScore;
        
        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.key] = true);
        document.addEventListener('keyup', (e) => keys[e.key] = false);
        
        function updatePlayerPosition() {
            if (!gameRunning) return;
            const speed = 8 + (gameState.inventory.speed || 1) * 2;
            if (keys['ArrowLeft'] || keys['a']) playerX = Math.max(0, playerX - speed);
            if (keys['ArrowRight'] || keys['d']) playerX = Math.min(720, playerX + speed);
            player.style.left = playerX + 'px';
            requestAnimationFrame(updatePlayerPosition);
        }
        
        let mobileMoving = null;
        function moveLeft() { mobileMoving = 'left'; }
        function moveRight() { mobileMoving = 'right'; }
        function stopMove() { mobileMoving = null; }
        
        function updateMobilePosition() {
            if (!gameRunning || !mobileMoving) return;
            const speed = 8 + (gameState.inventory.speed || 1) * 2;
            if (mobileMoving === 'left') playerX = Math.max(0, playerX - speed);
            if (mobileMoving === 'right') playerX = Math.min(720, playerX + speed);
            player.style.left = playerX + 'px';
            requestAnimationFrame(updateMobilePosition);
        }
        
        document.querySelectorAll('.mobile-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (btn.textContent.includes('⬅️')) moveLeft();
                else moveRight();
                updateMobilePosition();
            });
            btn.addEventListener('touchend', stopMove);
        });
        
        let paused = false;

function togglePause() {
    if (!gameRunning) return;
    paused = !paused;
    if (paused) {
        clearInterval(gameLoop);
        clearInterval(spawnLoop);
        showPauseMenu();
    } else {
        gameLoop = setInterval(updateGame, 25);
        spawnLoop = setInterval(spawnItem, 800);
        updatePlayerPosition();
    }
}

function startGame() {
            document.getElementById('menu').style.display = 'none';
            gameRunning = true;
            score = 0;
            items = [];
            lives = 3 + (gameState.inventory.life || 0);
            combo = 0;
            playerX = 360;
            player.style.left = playerX + 'px';
            player.classList.add('bouncing');
            updateLives();
            updateCombo();
            document.querySelectorAll('.item, .combo-text').forEach(e => e.remove());
            gameLoop = setInterval(updateGame, 25);
            document.addEventListener("keydown", (e) => { if(e.key === "p" || e.key === "P") togglePause(); });
            spawnLoop = setInterval(spawnItem, 800);
            updatePlayerPosition();
        }
        
        function spawnItem() {
            if (!gameRunning) return;
            const item = document.createElement('div');
            item.className = 'item';
            item.style.left = Math.random() * 750 + 'px';
            item.style.top = '-50px';
            
            const rand = Math.random();
            if (rand < 0.6) {
                item.textContent = rand < 0.5 ? '💰' : '💎';
                item.dataset.type = rand < 0.5 ? 'coin' : 'gem';
            } else if (rand < 0.9) {
                item.textContent = '💣';
                item.dataset.type = 'bomb';
            } else if (rand < 0.95) {
                item.textContent = '🎁';
                item.dataset.type = 'gift';
            } else {
                item.textContent = ['⚡', '🛡️', '🧲'][Math.floor(Math.random() * 3)];
                item.dataset.type = 'powerup';
            }
            
            item.style.animationDuration = (3.5 - currentLevel * 0.15) + 's';
            gameContainer.appendChild(item);
            items.push({ element: item, y: -50, speed: 2.5 + Math.random() * 2 + currentLevel * 0.25, type: item.dataset.type });
        }
        
        function updateGame() {
            items.forEach((item, index) => {
                item.y += item.speed;
                item.element.style.top = item.y + 'px';
                
                if ((gameState.inventory.magnet || 0) > 0 && item.type !== 'bomb') {
                    const itemX = parseFloat(item.element.style.left);
                    const dist = itemX - playerX;
                    if (Math.abs(dist) < 200) {
                        item.element.style.left = (itemX - dist * 0.08) + 'px';
                    }
                }
                
                const playerRect = player.getBoundingClientRect();
                const itemRect = item.element.getBoundingClientRect();
                
                if (itemRect.bottom > playerRect.top + 20 && itemRect.top < playerRect.bottom &&
                    itemRect.right > playerRect.left + 10 && itemRect.left < playerRect.right - 10) {
                    handleCollision(item, index);
                }
                
                if (item.y > 430) { if (item.element.parentNode) item.element.remove(); items.splice(index, 1); }
            });
            
            currentLevel = Math.floor(score / 500) + 1;
            document.getElementById('level').textContent = currentLevel;
        }
        
        function handleCollision(item, index) {
            const multiplier = (gameState.inventory.multi || 1);
            const scoreMultiplier = (gameState.inventory.x2score || 1);
            
            if (item.type === 'coin') { playSound('coin');
                score += 10 * multiplier * scoreMultiplier;
                addCombo();
            } else if (item.type === 'gem') { playSound('gem');
                score += 50 * multiplier * scoreMultiplier;
                addCombo();
            } else if (item.type === 'bomb') { playSound('bomb');
                const shield = gameState.inventory.shield || 0;
                if (shield > 0) {
                    gameState.inventory.shield = shield - 1;
                    localStorage.setItem('lobsterInventory', JSON.stringify(gameState.inventory));
                } else {
                    lives--; combo = 0; updateLives(); updateCombo();
                    if (lives <= 0) endGame();
                }
            } else if (item.type === 'gift') {
                score += 50;
                showComboText('+50🎁');
            } else if (item.type === 'powerup') {
                if (item.element.textContent === '⚡') gameState.inventory.speed = Math.min(10, (gameState.inventory.speed || 0) + 1);
                else if (item.element.textContent === '🛡️') gameState.inventory.shield = Math.min(5, (gameState.inventory.shield || 0) + 1);
                else if (item.element.textContent === '🧲') gameState.inventory.magnet = Math.min(5, (gameState.inventory.magnet || 0) + 1);
                localStorage.setItem('lobsterInventory', JSON.stringify(gameState.inventory));
                showComboText('升級!'); playSound('powerup');
            }
            
            item.element.classList.add('collected');
                if(item.type === 'coin') createParticles(playerX + 30, 380, '#ffd700');
                else if(item.type === 'gem') createParticles(playerX + 30, 380, '#00ffff');
            
            // 確保道具被正確移除
            setTimeout(() => {
                try {
                    if (item.element && item.element.parentNode) {
                        item.element.remove();
                    }
                    const idx = items.indexOf(item);
                    if (idx > -1) items.splice(idx, 1);
                } catch(e) {}
            }, 300);
        }
        
        function addCombo() {
            const now = Date.now();
            combo = (now - lastCollectTime < 500) ? combo + 1 : 1;
            lastCollectTime = now;
            updateCombo();
            clearTimeout(comboTimer);
            comboTimer = setTimeout(() => { combo = 0; updateCombo(); }, 1500);
        }
        
        function updateCombo() {
            document.getElementById('combo').textContent = combo;
            document.getElementById('comboDisplay').style.display = combo >= 5 ? 'block' : 'none';
            if (combo >= 5) document.getElementById('comboDisplay').textContent = combo + '連擊!';
        }
        
        function showComboText(text) {
            const el = document.createElement('div');
            el.className = 'combo-text';
            el.textContent = text;
            el.style.left = (playerX + 20) + 'px';
            el.style.bottom = '150px';
            gameContainer.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }
        
        function updateLives() {
            document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameLoop);
            clearInterval(spawnLoop);
            player.classList.remove('bouncing');
            
            if (score > gameState.highScore) {
                gameState.highScore = score;
                localStorage.setItem('lobsterHighScore', score);
            }
            
            const earnedCoins = Math.floor(score / 10);
            gameState.coins += earnedCoins;
            localStorage.setItem('lobsterCoins', gameState.coins);
            
            const name = prompt('🎮 遊戲結束！\n得分: ' + score + '\n獲得金幣: ' + earnedCoins + '\n\n輸入你的名字:') || '匿名';
            addToLeaderboard(name, score);
            
            alert('遊戲結束！\n得分: ' + score + '\n獲得金幣: +' + earnedCoins);
            document.getElementById('menu').style.display = 'flex';
            document.getElementById('highScore').textContent = gameState.highScore;
            document.getElementById('coins').textContent = gameState.coins;
        }
        
        function openShop() {
            document.getElementById('shop').style.display = 'flex';
            document.getElementById('shopCoins').textContent = gameState.coins;
            renderShop();
        }
        function closeShop() { document.getElementById('shop').style.display = 'none'; }
        
        function renderShop() {
            const container = document.getElementById('shopItems');
            container.innerHTML = '';
            shopItems.forEach(item => {
                const owned = gameState.inventory[item.id] || 0;
                const div = document.createElement('div');
                div.className = 'shopItem' + (owned >= item.maxLevel ? ' maxed' : '');
                div.innerHTML = `<div class="icon">${item.name.split(' ')[0]}</div><div class="name">${item.name.split(' ')[1]}</div><div style="font-size:0.7rem;opacity:0.7">${item.desc}</div><div class="price">💰 ${item.price * (owned + 1)}</div><div class="owned">Lv.${owned}/${item.maxLevel}</div>`;
                div.onclick = () => buyItem(item);
                container.appendChild(div);
            });
        }
        
        function buyItem(item) {
            const owned = gameState.inventory[item.id] || 0;
            if (owned >= item.maxLevel) { alert('已滿等！'); return; }
            const price = item.price * (owned + 1);
            if (gameState.coins < price) { alert('金幣不足！需要 ' + price + ' 💰'); return; }
            
            gameState.coins -= price;
            gameState.inventory[item.id] = owned + 1;
            localStorage.setItem('lobsterInventory', JSON.stringify(gameState.inventory));
            document.getElementById('coins').textContent = gameState.coins;
            document.getElementById('shopCoins').textContent = gameState.coins;
            renderShop();
            alert('購買成功！');
        }
        
        function openLeaderboard() {
            document.getElementById('leaderboard').style.display = 'flex';
            renderLeaderboard();
        }
        function closeLeaderboard() { 
            document.getElementById('leaderboard').style.display = 'none';
            // 關閉排行榜後繼續遊戲
            if (!gameRunning) {
                gameRunning = true;
                updatePlayerPosition();
            }
        }
        
        function addToLeaderboard(name, score) {
            let board = JSON.parse(localStorage.getItem('lobsterLeaderboard') || '[]');
            board.push({ name, score, date: new Date().toLocaleDateString() });
            board.sort((a, b) => b.score - a.score);
            board = board.slice(0, 20);
            localStorage.setItem('lobsterLeaderboard', JSON.stringify(board));
        }
        
        function renderLeaderboard() {
            const board = JSON.parse(localStorage.getItem('lobsterLeaderboard') || '[]');
            const container = document.getElementById('leaderboardList');
            container.innerHTML = board.map((entry, i) => `<div style="display:flex;justify-content:space-between;padding:12px;margin:8px 0;background:rgba(255,255,255,0.1);border-radius:10px;"><span>${i+1}. ${entry.name}</span><span>${entry.score} 分</span></div>`).join('') || '<p>還沒有人上榜！</p>';
        }

        // Sound Effect Functions
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function playSound(type) {
            try {
                if(!audioCtx) audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                if(type === 'coin') { osc.frequency.value = 800; gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
                else if(type === 'gem') { osc.frequency.value = 1200; gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15); osc.start(); osc.stop(audioCtx.currentTime + 0.15); }
                else if(type === 'bomb') { osc.type = 'sawtooth'; osc.frequency.value = 150; gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
                else if(type === 'powerup') { osc.frequency.value = 600; osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.2); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); osc.start(); osc.stop(audioCtx.currentTime + 0.2); }
            } catch(e) {}
        }


        // Particle Effects
        function createParticles(x, y, color) {
            for(let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.style.cssText = 'position:absolute;left:'+x+'px;top:'+y+'px;width:8px;height:8px;background:'+color+';border-radius:50%;pointer-events:none;z-index:100;';
                document.getElementById('gameContainer').appendChild(p);
                const angle = (Math.PI * 2 * i) / 8;
                const speed = 3 + Math.random() * 3;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let life = 1;
                const animate = () => {
                    life -= 0.03;
                    if(life <= 0) { p.remove(); return; }
                    x += vx; y += vy; vy += 0.2;
                    p.style.left = x + 'px'; p.style.top = y + 'px'; p.style.opacity = life;
                    requestAnimationFrame(animate);
                };
                animate();
            }
        }

    </script>
